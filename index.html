<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>NeuroSync Pro - نظام إدارة مفاتيح متطور</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap');

        :root {
            --bg-body: #f5f7fb;
            --card-bg: #ffffff;
            --surface: #ffffff;
            --border-light: #e9eef3;
            --text-primary: #1e2a3e;
            --text-secondary: #5b6e8c;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --message-user-bg: #6366f1;
            --message-user-text: white;
            --message-bot-bg: #f1f5f9;
            --message-bot-text: #1e2a3e;
            --font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --faq-hover: #e0e7ff;
            --delete-btn-bg: #fee2e2;
            --delete-btn-hover: #fecaca;
            --time-stamp: #94a3b8;
            --highlight-bg: #fde047;
            --highlight-text: #1e2a3e;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        body.dark {
            --bg-body: #0f172a;
            --card-bg: #1e293b;
            --surface: #1e293b;
            --border-light: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --message-bot-bg: #334155;
            --message-bot-text: #f1f5f9;
            --faq-hover: #334155;
            --delete-btn-bg: #7f1d1d;
            --delete-btn-hover: #991b1b;
            --time-stamp: #cbd5e1;
            --highlight-bg: #eab308;
            --highlight-text: #1e293b;
        }

        body {
            background: var(--bg-body);
            font-family: var(--font-family);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        .app-container {
            max-width: 100%;
            margin: 0;
            background: var(--card-bg);
            border-radius: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            border: none;
        }

        @media (min-width: 1024px) {
            body {
                padding: 12px;
                background: var(--bg-body);
            }
            .app-container {
                max-width: 1400px;
                margin: 0 auto;
                border-radius: 40px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
                border: 1px solid var(--border-light);
                height: calc(100vh - 24px);
            }
        }

        @media (max-width: 1023px) {
            .app-container {
                border-radius: 0;
                height: 100vh;
            }
            body {
                padding: 0;
            }
        }

        .header {
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 15;
        }

        .fullscreen-exit-bar {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            z-index: 10000;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 0;
        }
        .fullscreen-exit-bar button {
            background: transparent;
            border: none;
            padding: 10px 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .fullscreen-exit-bar button:hover {
            background: rgba(255,255,255,0.2);
        }
        body.fullscreen-chat-mode .fullscreen-exit-bar {
            display: flex;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            background: var(--accent);
            width: 38px;
            height: 38px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            color: white;
            margin-right: 6px;
        }

        .demo-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: var(--border-light);
            border: none;
            padding: 6px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover:not(:disabled) {
            background: var(--accent);
            color: white;
        }

        .search-btn {
            background: var(--accent);
            color: white;
        }

        .fullscreen-btn {
            background: var(--border-light);
        }
        .fullscreen-btn.active {
            background: #10b981;
            color: white;
        }

        .bg-btn {
            background: var(--border-light);
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 280px;
            background: var(--surface);
            border-left: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.25s ease;
            z-index: 20;
        }

        .menu-item {
            padding: 12px 18px;
            margin: 5px 10px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: 0.15s;
        }

        .menu-item.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .menu-item:hover:not(.active) {
            background: var(--border-light);
            color: var(--text-primary);
        }

        .content-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.3s ease;
            position: relative;
        }

        .message {
            display: flex;
            animation: fadeSlide 0.25s ease;
            position: relative;
            gap: 6px;
            align-items: flex-end;
            z-index: 2;
        }

        .user-message {
            justify-content: flex-end;
        }

        .bot-message {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 0.9rem;
            line-height: 1.45;
            word-break: break-word;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .user-message .bubble {
            background: var(--message-user-bg);
            color: var(--message-user-text);
            border-bottom-right-radius: 4px;
        }

        .bot-message .bubble {
            background: var(--message-bot-bg);
            color: var(--message-bot-text);
            border-bottom-left-radius: 4px;
        }
        
        .bubble a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed var(--accent);
        }
        
        .bubble code {
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85em;
        }
        
        .bubble pre {
            background: rgba(0,0,0,0.1);
            padding: 10px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        .bubble blockquote {
            border-right: 3px solid var(--accent);
            padding-right: 12px;
            margin: 8px 0;
            color: var(--text-secondary);
        }

        .message-time {
            font-size: 0.6rem;
            color: var(--time-stamp);
            margin-top: 4px;
            direction: ltr;
            text-align: right;
            opacity: 0.7;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            justify-content: flex-start;
        }

        .action-btn {
            background: var(--border-light);
            border: none;
            border-radius: 18px;
            padding: 3px 8px;
            font-size: 0.6rem;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .action-btn.delete-btn {
            background: var(--delete-btn-bg);
            color: #b91c1c;
        }

        .action-btn.delete-btn:hover {
            background: var(--delete-btn-hover);
        }

        .action-btn:hover {
            opacity: 0.8;
        }

        .input-area {
            padding: 10px 14px;
            background: var(--surface);
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 8px;
            align-items: center;
            z-index: 10;
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            background: var(--bg-body);
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .send-btn, .voice-btn {
            background: var(--accent);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 25px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .voice-btn { background: #3b82f6; }
        .voice-btn.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .send-btn:disabled, .voice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info-panel, .settings-panel {
            padding: 20px;
            overflow-y: auto;
        }

        .hidden {
            display: none !important;
        }

        .menu-toggle {
            display: none;
            background: var(--border-light);
            border: none;
            font-size: 1.3rem;
            padding: 6px 10px;
            border-radius: 25px;
            cursor: pointer;
            color: var(--text-primary);
        }

        @media (max-width: 780px) {
            .menu-toggle {
                display: block;
            }
            .sidebar {
                position: fixed;
                right: -280px;
                top: 65px;
                bottom: 0;
                z-index: 1000;
                background: var(--card-bg);
                width: 260px;
                border-radius: 20px 0 0 20px;
                box-shadow: -5px 0 20px rgba(0,0,0,0.3);
            }
            .sidebar.open {
                right: 0;
            }
            .overlay {
                display: none;
                position: fixed;
                top:0; left:0; right:0; bottom:0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .overlay.open {
                display: block;
            }
        }

        footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 6px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quick-buttons {
            display: flex;
            gap: 8px;
            padding: 8px 14px;
            overflow-x: auto;
            background: var(--surface);
            border-bottom: 1px solid var(--border-light);
            scrollbar-width: thin;
            transition: all 0.3s ease;
            z-index: 8;
        }
        
        .quick-chip {
            background: var(--border-light);
            padding: 5px 12px;
            border-radius: 35px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            color: var(--text-primary);
            transition: 0.2s;
        }
        
        .quick-chip:hover {
            background: var(--accent);
            color: white;
        }

        .search-modal, .bg-modal, .auth-modal, .json-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .search-modal.open, .bg-modal.open, .auth-modal.open, .json-modal.open {
            display: flex;
        }
        .search-container, .bg-picker, .auth-container, .json-container {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .auth-container input, .json-container textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 35px;
            border: 1px solid var(--border-light);
            background: var(--bg-body);
            color: var(--text-primary);
        }
        .json-container textarea {
            border-radius: 12px;
            font-family: monospace;
            font-size: 12px;
            height: 300px;
        }
        .password-wrapper {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1.1rem;
        }
        .bg-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }
        .bg-option {
            background: var(--border-light);
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .bg-option.selected {
            border-color: var(--accent);
        }
        .bg-thumb {
            width: 100%;
            height: 50px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            margin-bottom: 4px;
        }
        .key-item {
            background: var(--border-light);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-warning {
            background: var(--warning);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px 16px;
            background: var(--message-bot-bg);
            border-radius: 24px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .greeting-user {
            background: var(--accent);
            padding: 4px 10px;
            border-radius: 20px;
            color: white;
            font-size: 0.75rem;
        }
        .json-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">🧠</div>
            <div class="logo-text">NeuroSync Pro</div>
            <span class="badge" id="modeBadge">🔐 API</span>
        </div>
        <div class="controls">
            <span id="userGreetingSpan" class="greeting-user hidden"></span>
            <button id="loginLogoutBtn" class="icon-btn">🔐 دخول</button>
            <button class="icon-btn menu-toggle" id="menuToggleBtn">☰</button>
            <button class="icon-btn search-btn" id="openSearchBtn">🔍 بحث</button>
            <button class="icon-btn bg-btn" id="openBgBtn">🖼️ خلفية</button>
            <button class="icon-btn" id="themeToggleBtn">🌓 وضع</button>
            <button class="icon-btn" id="clearChatBtn">🗑️ مسح</button>
            <button class="icon-btn" id="saveChatBtn">💾 حفظ نص</button>
            <button class="icon-btn" id="exportJsonBtn">📦 تصدير JSON</button>
            <button class="icon-btn" id="importJsonBtn">📂 استيراد JSON</button>
            <button class="icon-btn fullscreen-btn" id="fullscreenBtn">⛶ ملء</button>
        </div>
    </div>

    <div class="fullscreen-exit-bar" id="fullscreenExitBar">
        <button id="exitFullscreenBtn">↖️ خروج</button>
    </div>

    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="menu-item active" data-tab="chat">💬 المحادثة</div>
            <div class="menu-item" data-tab="info">ℹ️ معلومات</div>
            <div class="menu-item" data-tab="settings" id="settingsMenuItem">⚙️ إدارة المفاتيح</div>
        </div>
        <div id="overlay" class="overlay"></div>

        <div class="content-panel">
            <div id="apiWarning" class="api-warning hidden"></div>
            <div class="quick-buttons" id="quickButtons"></div>
            <div class="chat-window" id="chatWindow"></div>

            <div id="infoPanel" class="info-panel hidden"></div>
            <div id="settingsPanel" class="settings-panel hidden"></div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="اسألني أي شيء... أنا NeuroSync Pro" autocomplete="off">
                <button class="voice-btn" id="voiceBtn" title="تسجيل صوتي">🎤</button>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
            <footer>🧠 NeuroSync Pro | يدعم Markdown كامل | جميع البيانات محفوظة في JSON</footer>
        </div>
    </div>
</div>

<div id="searchModal" class="search-modal"></div>
<div id="bgModal" class="bg-modal"></div>
<div id="authModal" class="auth-modal"></div>
<div id="jsonModal" class="json-modal"></div>

<script>
    // ========== نظام إدارة JSON الموحد ==========
    let currentUser = null;
    let apiKeysList = [];
    let isDemoMode = false;
    let allKeysFailed = false;
    let conversationHistory = [];
    let isWaitingForResponse = false;
    let currentBgImage = '';
    let mediaRecorder = null;
    let isRecording = false;
    let bgGallery = [];
    let quickReplies = []; // الردود السريعة القابلة للتخصيص
    
    // ========== هيكل JSON الرئيسي ==========
    let mainJSON = {
        version: "2.0",
        lastUpdated: Date.now(),
        users: [],
        apiKeys: [],
        conversations: {
            current: [],
            archives: []
        },
        settings: {
            theme: "light",
            backgroundImage: "",
            fontSize: 16,
            fontFamily: "Inter",
            animations: true,
            language: "ar"
        },
        quickReplies: [
            { id: "qr1", text: "من صنعك?", icon: "🤖" },
            { id: "qr2", text: "ما هو NeuroSync Pro?", icon: "🧠" },
            { id: "qr3", text: "أهلاً بك", icon: "👋" },
            { id: "qr4", text: "ماذا تستطيع أن تفعل?", icon: "⚡" },
            { id: "qr5", text: "ما هي اللغة التي تتحدثها?", icon: "🗣️" },
            { id: "qr6", text: "هل أنت مجاني?", icon: "💸" },
            { id: "qr7", text: "اخبرني عن Markdown", icon: "📝" }
        ],
        backgroundGallery: [],
        statistics: {
            totalMessages: 0,
            conversationsCount: 1,
            lastActive: Date.now(),
            apiCalls: 0
        }
    };
    
    // ========== تحميل وحفظ JSON ==========
    function loadFromJSON() {
        const savedJSON = localStorage.getItem('neuronsync_main_json');
        if(savedJSON) {
            try {
                const parsed = JSON.parse(savedJSON);
                mainJSON = { ...mainJSON, ...parsed };
                
                // استعادة البيانات
                currentUser = parsed.currentUser || null;
                apiKeysList = parsed.apiKeys || [];
                conversationHistory = parsed.conversations?.current || [];
                currentBgImage = parsed.settings?.backgroundImage || '';
                quickReplies = parsed.quickReplies || mainJSON.quickReplies;
                bgGallery = parsed.backgroundGallery || [];
                
                // تطبيق الإعدادات
                if(parsed.settings?.theme === 'dark') document.body.classList.add('dark');
                else document.body.classList.remove('dark');
                
                if(apiKeysList.length === 0) enableDemoMode();
                else disableDemoMode();
                
                updateStatistics('load');
                return true;

    // ========== نظام المصادقة ==========
    function loadUsers() {
        const users = localStorage.getItem('neuronsync_users');
        return users ? JSON.parse(users) : [];

    function saveUsers(users) {
        localStorage.setItem('neuronsync_users', JSON.stringify(users));

    function hashPassword(password) {
        return btoa(password);
    }
    
    function verifyPassword(password, hash) {
        return btoa(password) === hash;
    }
    
    function registerUser(email, password, name) {
        const users = loadUsers();
        if(users.find(u => u.email === email)) {
            return { success: false, message: 'البريد الإلكتروني مسجل بالفعل' };
        }
        if(password.length < 4) {
            return { success: false, message: 'كلمة المرور يجب أن تكون 4 أحرف على الأقل' };
        }
        users.push({
            email: email,
            password: hashPassword(password),
            name: name,
            createdAt: Date.now()
        });
        saveUsers(users);
        return { success: true, message: 'تم التسجيل بنجاح' };
    }
    
    function loginUser(email, password) {
        const users = loadUsers();
        const user = users.find(u => u.email === email);
        if(!user) {
            return { success: false, message: 'البريد الإلكتروني غير موجود' };
        }
        if(!verifyPassword(password, user.password)) {
            return { success: false, message: 'كلمة المرور غير صحيحة' };
        }
        return { success: true, user: { email: user.email, name: user.name } };
    }

        }
        if (lowerMsg.includes('قدرات') || lowerMsg.includes('ماذا تستطيع')) {
            return "## ⚡ قدرات NeuroSync Pro\n\n1. **محادثة ذكية**\n2. **دعم Markdown كامل**\n3. **تسجيل صوتي** 🎤\n4. **بحث في المحادثة** 🔍\n5. **خلفيات مخصصة** 🖼️\n6. **وضع ليلي** 🌙\n7. **التحكم عبر JSON** 📦";

    }
    
    async function testApiKeysParallel() {
        if(apiKeysList.length === 0) return { working: [], failed: [] };
        const results = await Promise.all(apiKeysList.map(async (key) => {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                const response = await fetch("https://api.groq.com/openai/v1/models", {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${key}` },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return { key, working: response.ok };
            } catch(e) {
                return { key, working: false };
            }
        }));
        return {
            working: results.filter(r => r.working).map(r => r.key),
            failed: results.filter(r => !r.working).map(r => r.key)
        };
    }
    
    async function callGroqWithFallback(userMessage, retryCount = 0) {
        if(isDemoMode || apiKeysList.length === 0) {
            return await getLocalMockResponse(userMessage);
        }
        if(allKeysFailed) {
            enableDemoMode();
            return await getLocalMockResponse(userMessage);
        }
        if(retryCount >= apiKeysList.length) {
            allKeysFailed = true;
            enableDemoMode();
            return await getLocalMockResponse(userMessage);
        }
        
        const currentKey = apiKeysList[retryCount];
        if(!currentKey) return callGroqWithFallback(userMessage, retryCount + 1);
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentKey}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "أنت NeuroSync Pro. قدم إجابات مفيدة ومفصلة. استخدم Markdown في ردودك." },
                        ...conversationHistory.slice(-15).filter(m => m.role !== 'system').map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.content })),
                        { role: "user", content: userMessage }
                    ],
                    temperature: 0.7,
                    max_tokens: 1000
                }),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            if(!response.ok) return callGroqWithFallback(userMessage, retryCount + 1);
            const data = await response.json();
            if(data.choices && data.choices[0]?.message?.content) {
                allKeysFailed = false;
                if(isDemoMode) disableDemoMode();
                mainJSON.statistics.apiCalls++;
                saveToJSON();
                return data.choices[0].message.content;
            }
            return callGroqWithFallback(userMessage, retryCount + 1);
        } catch(error) {
            return callGroqWithFallback(userMessage, retryCount + 1);
        }
    }
    
    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            let audioChunks = [];
            
            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                await transcribeWithWhisper(audioBlob);
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            isRecording = true;
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.classList.add('recording');
            voiceBtn.innerHTML = '⏹️';
            
            setTimeout(() => {
                if(isRecording) stopRecording();
            }, 10000);
        } catch(err) {
            alert("⚠️ لا يمكن الوصول إلى الميكروفون");
        }
    }
    
    function stopRecording() {
        if(mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.classList.remove('recording');
            voiceBtn.innerHTML = '🎤';
        }
    }
    
    async function transcribeWithWhisper(audioBlob) {
        if(apiKeysList.length > 0 && !isDemoMode) {
            try {
                const formData = new FormData();
                formData.append('file', audioBlob, 'audio.webm');
                formData.append('model', 'whisper-large-v3');
                
                const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${apiKeysList[0]}` },
                    body: formData
                });
                if(response.ok) {
                    const data = await response.json();
                    if(data.text) {
                        document.getElementById('messageInput').value = data.text;
                        sendUserMessage(data.text);
                        return;
                    }
                }
            } catch(e) {
                console.log('Whisper failed, falling back to Web Speech');
            }
        }
        
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('messageInput').value = text;
                sendUserMessage(text);
            };
            recognition.onerror = () => alert("لم يتم التعرف على الصوت");
            recognition.start();
        } else {
            alert("المتصفح لا يدعم التعرف على الصوت");
        }
    }

    let lastRenderedCount = 0;
    
    function addMessageToHistory(role, content, timestamp = Date.now()) {
        conversationHistory.push({ role, content, timestamp });

        renderAllMessages();

    function renderAllMessages(searchTerm = null) {
        const chatWindow = document.getElementById('chatWindow');
        if(!chatWindow) return;
        
        const existingMessages = chatWindow.children.length;
        if(existingMessages === conversationHistory.length && !searchTerm) {
            const lastMsg = conversationHistory[conversationHistory.length - 1];
            if(lastMsg && lastMsg !== lastRenderedCount) {
                appendSingleMessage(lastMsg, conversationHistory.length - 1, searchTerm);
            }
        } else {
            chatWindow.innerHTML = '';
            conversationHistory.forEach((msg, idx) => {
                appendSingleMessage(msg, idx, searchTerm);
            });
        }
        lastRenderedCount = conversationHistory.length;
        chatWindow.scrollTop = chatWindow.scrollHeight;
        applyBackground();
    }
    
    function appendSingleMessage(msg, idx, searchTerm) {
        const chatWindow = document.getElementById('chatWindow');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${msg.role === 'user' ? 'user-message' : 'bot-message'}`;
        let displayContent = msg.content;
        if(searchTerm && searchTerm.trim() !== "") {
            const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
            displayContent = displayContent.replace(regex, `<span class="highlight">$1</span>`);
        }
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if(msg.role === 'assistant') {
            bubble.innerHTML = renderMarkdown(displayContent);
        } else {
            bubble.innerHTML = displayContent.replace(/\n/g, '<br>');
        }
        
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        timeSpan.innerText = new Date(msg.timestamp).toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        bubble.appendChild(timeSpan);
        
        const actionDiv = document.createElement('div');
        actionDiv.className = 'action-buttons';
        
        const copyBtn = document.createElement('button');
        copyBtn.className = 'action-btn';
        copyBtn.innerHTML = '📋 نسخ';
        copyBtn.onclick = (e) => {
            e.stopPropagation();
            navigator.clipboard.writeText(msg.content.replace(/<[^>]*>/g, ''));
            copyBtn.innerHTML = '✅ تم';
            setTimeout(() => copyBtn.innerHTML = '📋 نسخ', 1500);
        };
        actionDiv.appendChild(copyBtn);
        
        if(msg.role === 'assistant') {
            const listenBtn = document.createElement('button');
            listenBtn.className = 'action-btn';
            listenBtn.innerHTML = '🔊 استماع';
            listenBtn.onclick = (e) => {
                e.stopPropagation();
                const utterance = new SpeechSynthesisUtterance(msg.content.replace(/<[^>]*>/g, ''));
                utterance.lang = 'ar-SA';
                window.speechSynthesis.speak(utterance);
            };
            actionDiv.appendChild(listenBtn);
        }
        
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'action-btn delete-btn';
        deleteBtn.innerHTML = '🗑️ حذف';
        deleteBtn.onclick = (e) => {
            e.stopPropagation();
            if(confirm('حذف هذه الرسالة؟')) {
                conversationHistory.splice(idx, 1);
                saveConversationToLocal();
                renderAllMessages();
                saveToJSON();
            }
        };
        actionDiv.appendChild(deleteBtn);
        
        bubble.appendChild(actionDiv);
        msgDiv.appendChild(bubble);
        chatWindow.appendChild(msgDiv);
    }
    
    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    
    let typingTimeout = null;
    
    async function sendUserMessage(text = null) {
        if(isWaitingForResponse) return;
        const message = text || document.getElementById('messageInput').value.trim();
        if(!message) return;
        if(!text) document.getElementById('messageInput').value = '';
        
        addMessageToHistory('user', message);
        isWaitingForResponse = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('voiceBtn').disabled = true;
        
        const chatWindow = document.getElementById('chatWindow');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot-message';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span><span style="margin-right:8px;">NeuroSync يكتب...</span></div>`;
        chatWindow.appendChild(typingDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        
        typingTimeout = setTimeout(() => {
            const indicator = document.getElementById('typingIndicator');
            if(indicator) {
                indicator.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span><span style="margin-right:8px;">جاري التفكير... قد يستغرق الرد بضع ثوانٍ</span></div>`;
            }
        }, 5000);
        
        try {
            const reply = await callGroqWithFallback(message, 0);
            clearTimeout(typingTimeout);
            const indicator = document.getElementById('typingIndicator');
            if(indicator) indicator.remove();
            addMessageToHistory('assistant', reply);
        } catch(err) {
            clearTimeout(typingTimeout);
            const indicator = document.getElementById('typingIndicator');
            if(indicator) indicator.remove();
            addMessageToHistory('assistant', "⚠️ حدث خطأ تقني. تم التبديل إلى الوضع التجريبي.");
            enableDemoMode();
        } finally {
            isWaitingForResponse = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('voiceBtn').disabled = false;
        }
    }
    
    function saveConversationToLocal() {
        localStorage.setItem('neuronsync_chat_history', JSON.stringify(conversationHistory));
    }
    
    function loadConversationFromLocal() {
        const saved = localStorage.getItem('neuronsync_chat_history');
        if(saved) {
            try {
                const parsed = JSON.parse(saved);
                if(Array.isArray(parsed) && parsed.length) {
                    conversationHistory = parsed;
                    renderAllMessages();
                    return;
                }
            } catch(e) {}
        }
        conversationHistory = [{
            role: 'assistant',
            content: "# 🧠 مرحباً بك في **NeuroSync Pro**!\n\n## ✨ الميزات الجديدة:\n- **التحكم الكامل عبر ملف JSON** 📦\n- **تصدير واستيراد جميع البيانات**\n- **ردود سريعة قابلة للتخصيص**\n- **دعم Markdown كامل**\n- **تسجيل صوتي** 🎤\n- **وضع تجريبي مدمج**\n- **نظام مصادقة حقيقي** 🔐\n- **خلفيات مخصصة** 🖼️\n\n💡 **نصيحة:** استخدم زر \"تصدير JSON\" لحفظ نسخة احتياطية من جميع بياناتك!",
            timestamp: Date.now()
        }];
        saveConversationToLocal();
        renderAllMessages();
    }

    function applyBackground() {
        const chatWindow = document.getElementById('chatWindow');
        if(!chatWindow) return;
        if(currentBgImage && currentBgImage !== '') {
            if(currentBgImage.startsWith('data:image') || currentBgImage.startsWith('http')) {
                chatWindow.style.backgroundImage = `url('${currentBgImage}')`;
                chatWindow.style.backgroundSize = 'cover';
                chatWindow.style.backgroundPosition = 'center';
            } else if(currentBgImage === 'gradient1') chatWindow.style.backgroundImage = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            else if(currentBgImage === 'gradient2') chatWindow.style.backgroundImage = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
            else if(currentBgImage === 'gradient3') chatWindow.style.backgroundImage = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
            else if(currentBgImage === 'gradient4') chatWindow.style.backgroundImage = 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)';
            else {
                chatWindow.style.backgroundImage = 'none';
                chatWindow.style.backgroundColor = 'var(--bg-body)';
            }
        } else {
            chatWindow.style.backgroundImage = 'none';
            chatWindow.style.backgroundColor = 'var(--bg-body)';
        }
    }

    function setupSearch() {
        const searchModal = document.getElementById('searchModal');
        const openSearchBtn = document.getElementById('openSearchBtn');
        
        searchModal.innerHTML = `
            <div class="search-container">
                <h3>🔍 بحث في المحادثة</h3>
                <input type="text" id="searchInput" placeholder="اكتب كلمة للبحث..." style="width:100%; padding:10px; margin:10px 0; border-radius:25px; border:1px solid var(--border-light);">
                <div id="searchResults"></div>
                <button id="closeSearchBtn" style="width:100%; margin-top:10px; background:var(--border-light); border:none; padding:8px; border-radius:12px;">إغلاق</button>
            </div>
        `;
        
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        
        function performSearch() {
            const query = searchInput.value.trim();
            if(!query) {
                searchResults.innerHTML = '<div style="color:var(--text-secondary);">✏️ اكتب كلمة للبحث</div>';
                return;
            }
            const results = [];
            conversationHistory.forEach((msg, idx) => {
                const plainContent = msg.content.replace(/<[^>]*>/g, '');
                if(plainContent.toLowerCase().includes(query.toLowerCase())) {
                    results.push({ index: idx, role: msg.role, content: plainContent, timestamp: msg.timestamp });
                }
            });
            if(results.length === 0) {
                searchResults.innerHTML = '<div>😔 لا توجد نتائج</div>';
                return;
            }
            searchResults.innerHTML = results.map(res => `
                <div class="search-result-item" data-index="${res.index}" style="padding:10px; margin:8px 0; background:var(--border-light); border-radius:12px; cursor:pointer;">
                    <div><strong>${res.role === 'user' ? '👤 المستخدم' : '🤖 NeuroSync'}</strong> 🕒 ${new Date(res.timestamp).toLocaleTimeString()}</div>
                    <div style="font-size:0.8rem;">${res.content.substring(0, 100)}...</div>
                </div>
            `);
            document.querySelectorAll('.search-result-item').forEach(el => {
                el.onclick = () => {
                    const idx = parseInt(el.dataset.index);
                    searchModal.classList.remove('open');
                    const messages = document.querySelectorAll('.message');
                    if(messages[idx]) messages[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                };
            });
        }
        
        searchInput.addEventListener('input', performSearch);
        document.getElementById('closeSearchBtn').onclick = () => searchModal.classList.remove('open');
        openSearchBtn.onclick = () => {
            searchModal.classList.add('open');
            setTimeout(() => searchInput.focus(), 100);
        };
    }
