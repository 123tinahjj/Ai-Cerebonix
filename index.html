<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>NeuroSync Pro - نظام إدارة مفاتيح متطور</title>
    <!-- Marked.js لدعم Markdown كامل -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify للأمان -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap');

        :root {
            --bg-body: #f5f7fb;
            --card-bg: #ffffff;
            --surface: #ffffff;
            --border-light: #e9eef3;
            --text-primary: #1e2a3e;
            --text-secondary: #5b6e8c;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --message-user-bg: #6366f1;
            --message-user-text: white;
            --message-bot-bg: #f1f5f9;
            --message-bot-text: #1e2a3e;
            --font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --faq-hover: #e0e7ff;
            --delete-btn-bg: #fee2e2;
            --delete-btn-hover: #fecaca;
            --time-stamp: #94a3b8;
            --highlight-bg: #fde047;
            --highlight-text: #1e2a3e;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
        }

        body.dark {
            --bg-body: #0f172a;
            --card-bg: #1e293b;
            --surface: #1e293b;
            --border-light: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --message-bot-bg: #334155;
            --message-bot-text: #f1f5f9;
            --faq-hover: #334155;
            --delete-btn-bg: #7f1d1d;
            --delete-btn-hover: #991b1b;
            --time-stamp: #cbd5e1;
            --highlight-bg: #eab308;
            --highlight-text: #1e293b;
        }

        body {
            background: var(--bg-body);
            font-family: var(--font-family);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
            margin: 0;
        }

        .app-container {
            max-width: 100%;
            margin: 0;
            background: var(--card-bg);
            border-radius: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            border: none;
        }

        @media (min-width: 1024px) {
            body {
                padding: 12px;
                background: var(--bg-body);
            }
            .app-container {
                max-width: 1400px;
                margin: 0 auto;
                border-radius: 40px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
                border: 1px solid var(--border-light);
                height: calc(100vh - 24px);
            }
        }

        @media (max-width: 1023px) {
            .app-container {
                border-radius: 0;
                height: 100vh;
            }
            body {
                padding: 0;
            }
        }

        .header {
            padding: 12px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 15;
        }

        .fullscreen-exit-bar {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            z-index: 10000;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 0;
        }
        .fullscreen-exit-bar button {
            background: transparent;
            border: none;
            padding: 10px 14px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .fullscreen-exit-bar button:hover {
            background: rgba(255,255,255,0.2);
        }
        body.fullscreen-chat-mode .fullscreen-exit-bar {
            display: flex;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            background: var(--accent);
            width: 38px;
            height: 38px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 600;
            color: white;
            margin-right: 6px;
        }

        .demo-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .controls {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: var(--border-light);
            border: none;
            padding: 6px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover:not(:disabled) {
            background: var(--accent);
            color: white;
        }

        .search-btn {
            background: var(--accent);
            color: white;
        }

        .fullscreen-btn {
            background: var(--border-light);
        }
        .fullscreen-btn.active {
            background: #10b981;
            color: white;
        }

        .bg-btn {
            background: var(--border-light);
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 280px;
            background: var(--surface);
            border-left: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.25s ease;
            z-index: 20;
        }

        .menu-item {
            padding: 12px 18px;
            margin: 5px 10px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-secondary);
            transition: 0.15s;
        }

        .menu-item.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .menu-item:hover:not(.active) {
            background: var(--border-light);
            color: var(--text-primary);
        }

        .content-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.3s ease;
            position: relative;
        }

        .message {
            display: flex;
            animation: fadeSlide 0.25s ease;
            position: relative;
            gap: 6px;
            align-items: flex-end;
            z-index: 2;
        }

        .user-message {
            justify-content: flex-end;
        }

        .bot-message {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 85%;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 0.9rem;
            line-height: 1.45;
            word-break: break-word;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .user-message .bubble {
            background: var(--message-user-bg);
            color: var(--message-user-text);
            border-bottom-right-radius: 4px;
        }

        .bot-message .bubble {
            background: var(--message-bot-bg);
            color: var(--message-bot-text);
            border-bottom-left-radius: 4px;
        }
        
        .bubble a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed var(--accent);
        }
        
        .bubble code {
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85em;
        }
        
        .bubble pre {
            background: rgba(0,0,0,0.1);
            padding: 10px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        .bubble blockquote {
            border-right: 3px solid var(--accent);
            padding-right: 12px;
            margin: 8px 0;
            color: var(--text-secondary);
        }

        .message-time {
            font-size: 0.6rem;
            color: var(--time-stamp);
            margin-top: 4px;
            direction: ltr;
            text-align: right;
            opacity: 0.7;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
            margin-top: 5px;
            justify-content: flex-start;
        }

        .action-btn {
            background: var(--border-light);
            border: none;
            border-radius: 18px;
            padding: 3px 8px;
            font-size: 0.6rem;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .action-btn.delete-btn {
            background: var(--delete-btn-bg);
            color: #b91c1c;
        }

        .action-btn.delete-btn:hover {
            background: var(--delete-btn-hover);
        }

        .action-btn:hover {
            opacity: 0.8;
        }

        .input-area {
            padding: 10px 14px;
            background: var(--surface);
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 8px;
            align-items: center;
            z-index: 10;
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid var(--border-light);
            background: var(--bg-body);
            color: var(--text-primary);
            font-size: 0.85rem;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .send-btn, .voice-btn {
            background: var(--accent);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 25px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .voice-btn { background: #3b82f6; }
        .voice-btn.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .send-btn:disabled, .voice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info-panel, .settings-panel {
            padding: 20px;
            overflow-y: auto;
        }

        .hidden {
            display: none !important;
        }

        .menu-toggle {
            display: none;
            background: var(--border-light);
            border: none;
            font-size: 1.3rem;
            padding: 6px 10px;
            border-radius: 25px;
            cursor: pointer;
            color: var(--text-primary);
        }

        @media (max-width: 780px) {
            .menu-toggle {
                display: block;
            }
            .sidebar {
                position: fixed;
                right: -280px;
                top: 65px;
                bottom: 0;
                z-index: 1000;
                background: var(--card-bg);
                width: 260px;
                border-radius: 20px 0 0 20px;
                box-shadow: -5px 0 20px rgba(0,0,0,0.3);
            }
            .sidebar.open {
                right: 0;
            }
            .overlay {
                display: none;
                position: fixed;
                top:0; left:0; right:0; bottom:0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .overlay.open {
                display: block;
            }
        }

        footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 6px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quick-buttons {
            display: flex;
            gap: 8px;
            padding: 8px 14px;
            overflow-x: auto;
            background: var(--surface);
            border-bottom: 1px solid var(--border-light);
            scrollbar-width: thin;
            transition: all 0.3s ease;
            z-index: 8;
        }
        
        .quick-chip {
            background: var(--border-light);
            padding: 5px 12px;
            border-radius: 35px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            color: var(--text-primary);
            transition: 0.2s;
        }
        
        .quick-chip:hover {
            background: var(--accent);
            color: white;
        }

        .search-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .search-modal.open {
            display: flex;
        }
        .search-container {
            background: var(--card-bg);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.2s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .search-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-search {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .search-input-area {
            padding: 12px 18px;
            border-bottom: 1px solid var(--border-light);
        }
        .search-input-area input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 50px;
            border: 1px solid var(--border-light);
            background: var(--bg-body);
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
        }
        .search-results {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .search-result-item {
            padding: 12px;
            margin-bottom: 8px;
            background: var(--border-light);
            border-radius: 18px;
            cursor: pointer;
            transition: 0.15s;
        }
        .search-result-item:hover {
            background: var(--faq-hover);
        }
        .result-preview {
            font-size: 0.8rem;
            line-height: 1.4;
            word-break: break-word;
        }
        .highlight {
            background: var(--highlight-bg);
            color: var(--highlight-text);
            padding: 0 2px;
            border-radius: 4px;
            font-weight: 600;
        }

        .key-item {
            background: var(--border-light);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .key-info {
            flex: 1;
            font-size: 0.8rem;
            font-family: monospace;
            word-break: break-all;
        }
        .delete-key-btn, .export-keys-btn, .import-keys-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .export-keys-btn { background: var(--success); }
        .import-keys-btn { background: var(--info); }
        
        .add-key-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--border-light);
        }
        .key-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .key-input-group input {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            background: var(--bg-body);
            color: var(--text-primary);
            font-family: monospace;
            font-size: 0.8rem;
        }
        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-warning {
            background: var(--warning);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .keys-status {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 12px;
            background: var(--surface);
            border: 1px solid var(--border-light);
        }
        .status-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 10px 16px;
            background: var(--message-bot-bg);
            border-radius: 24px;
            width: fit-content;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .bg-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }
        .bg-option {
            background: var(--border-light);
            border-radius: 12px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .bg-option.selected {
            border-color: var(--accent);
        }
        .bg-thumb {
            width: 100%;
            height: 50px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            margin-bottom: 4px;
        }
        .bg-modal, .password-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .bg-modal.open, .password-modal.open {
            display: flex;
        }
        .bg-picker, .password-box {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .password-box {
            text-align: center;
        }
        .password-box input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border-radius: 35px;
            border: 1px solid var(--border-light);
            background: var(--bg-body);
            color: var(--text-primary);
            text-align: center;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">🧠</div>
            <div class="logo-text">NeuroSync Pro</div>
            <span class="badge" id="modeBadge">🔐 API</span>
        </div>
        <div class="controls">
            <span id="userGreetingSpan" class="greeting-user hidden"></span>
            <button id="loginLogoutBtn" class="login-btn-header">🔐 دخول</button>
            <button class="icon-btn menu-toggle" id="menuToggleBtn">☰</button>
            <button class="icon-btn search-btn" id="openSearchBtn">🔍 بحث</button>
            <button class="icon-btn bg-btn" id="openBgBtn">🖼️ خلفية</button>
            <button class="icon-btn" id="themeToggleBtn">🌓 وضع</button>
            <button class="icon-btn" id="clearChatBtn">🗑️ مسح</button>
            <button class="icon-btn" id="saveChatBtn">💾 حفظ</button>
            <button class="icon-btn fullscreen-btn" id="fullscreenBtn">⛶ ملء</button>
        </div>
    </div>

    <div class="fullscreen-exit-bar" id="fullscreenExitBar">
        <button id="exitFullscreenBtn">↖️</button>
    </div>

    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="menu-item active" data-tab="chat">💬 المحادثة</div>
            <div class="menu-item" data-tab="info">ℹ️ معلومات</div>
            <div class="menu-item" data-tab="settings" id="settingsMenuItem">⚙️ إدارة المفاتيح</div>
        </div>
        <div id="overlay" class="overlay"></div>

        <div class="content-panel">
            <div id="apiWarning" class="api-warning hidden"></div>
            <div class="quick-buttons" id="quickButtons">
                <div class="quick-chip" data-question="من صنعك؟">🤖 من صنعك؟</div>
                <div class="quick-chip" data-question="ما هو NeuroSync Pro؟">🧠 ما هو NeuroSync Pro؟</div>
                <div class="quick-chip" data-question="أهلاً بك">👋 أهلاً بك</div>
                <div class="quick-chip" data-question="ماذا تستطيع أن تفعل؟">⚡ قدراتك</div>
                <div class="quick-chip" data-question="ما هي اللغة التي تتحدثها؟">🗣️ اللغات</div>
                <div class="quick-chip" data-question="هل أنت مجاني؟">💸 مجاني؟</div>
                <div class="quick-chip" data-question="اخبرني عن Markdown">📝 تجربة Markdown</div>
            </div>
            <div class="chat-window" id="chatWindow"></div>

            <div id="infoPanel" class="info-panel hidden"></div>
            <div id="settingsPanel" class="settings-panel hidden"></div>

            <div class="input-area">
                <input type="text" id="messageInput" placeholder="اسألني أي شيء... أنا NeuroSync Pro" autocomplete="off">
                <button class="voice-btn" id="voiceBtn" title="تسجيل صوتي">🎤</button>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
            <footer>🧠 NeuroSync Pro | صنع بواسطة محمد حلاق 🇱🇧 | يدعم Markdown كامل | وضع تجريبي مدمج</footer>
        </div>
    </div>
</div>

<div id="searchModal" class="search-modal">...</div>
<div id="bgModal" class="bg-modal">...</div>
<div id="passwordModal" class="password-modal">...</div>

<script>
    // ========== التكوينات الأساسية ==========
    const DEMO_MODE_KEY = "__DEMO_MODE__";
    let apiKeysList = [];
    let isDemoMode = false;
    let allKeysFailed = false;
    let currentUser = JSON.parse(localStorage.getItem('neuronsync_user')) || null;
    let conversationHistory = [];
    let isWaitingForResponse = false;
    let currentBgImage = localStorage.getItem('neuronsync_bg_image') || '';
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let currentUtterance = null;
    
    // تهيئة marked مع دعم RTL
    marked.setOptions({
        breaks: true,
        gfm: true,
        headerIds: false,
        mangle: false
    });
    
    // ========== دعم Markdown الآمن ==========
    function renderMarkdown(text) {
        try {
            const rawHtml = marked.parse(text);
            return DOMPurify.sanitize(rawHtml, {
                ALLOWED_TAGS: ['p', 'br', 'strong', 'em', 'u', 'code', 'pre', 'blockquote', 'ul', 'ol', 'li', 'a', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'hr', 'img', 'table', 'thead', 'tbody', 'tr', 'th', 'td'],
                ALLOWED_ATTR: ['href', 'target', 'src', 'alt', 'title']
            });
        } catch(e) {
            return text.replace(/\n/g, '<br>');
        }
    }
    
    // ========== وضع تجريبي مدمج ==========
    function enableDemoMode() {
        isDemoMode = true;
        allKeysFailed = false;
        document.getElementById('modeBadge').innerHTML = '🧪 تجريبي';
        document.getElementById('modeBadge').classList.add('demo-badge');
        const warning = document.getElementById('apiWarning');
        if(warning) {
            warning.classList.remove('hidden');
            warning.innerHTML = '✨ وضع تجريبي نشط (محاكاة محلية) - يمكنك إضافة مفتاح Groq API للردود الحقيقية';
            warning.style.background = 'var(--warning)';
            warning.style.color = 'var(--text-primary)';
        }
    }
    
    function disableDemoMode() {
        isDemoMode = false;
        document.getElementById('modeBadge').innerHTML = '🔐 API';
        document.getElementById('modeBadge').classList.remove('demo-badge');
        updateApiWarning();
    }
    
    // ========== تسجيل صوتي حقيقي (يعمل محلياً) ==========
    async function startRecording() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = (event) => {
                audioChunks.push(event.data);
            };
            
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                await transcribeAudio(audioBlob);
                stream.getTracks().forEach(track => track.stop());
            };
            
            mediaRecorder.start();
            isRecording = true;
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.classList.add('recording');
            voiceBtn.innerHTML = '⏹️';
            
            setTimeout(() => {
                if(isRecording) stopRecording();
            }, 10000);
        } catch(err) {
            console.error("Microphone error:", err);
            alert("⚠️ لا يمكن الوصول إلى الميكروفون. تأكد من السماح بالوصول.");
        }
    }
    
    function stopRecording() {
        if(mediaRecorder && isRecording) {
            mediaRecorder.stop();
            isRecording = false;
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.classList.remove('recording');
            voiceBtn.innerHTML = '🎤';
        }
    }
    
    async function transcribeAudio(audioBlob) {
        // محاكاة تحويل الصوت إلى نص (لأن Groq API يتطلب مفتاح للـ Whisper)
        // بدلاً من ذلك، نستخدم Web Speech API للتعرف على الصوت
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'ar-SA';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                document.getElementById('messageInput').value = text;
                sendUserMessage(text);
            };
            
            recognition.onerror = () => {
                alert("لم يتم التعرف على الصوت، حاول مرة أخرى");
            };
            
            recognition.start();
        } else {
            alert("المتصفح لا يدعم التعرف على الصوت. استخدم الإدخال النصي.");
        }
    }
    
    // ========== محاكاة محلية (وضع تجريبي) ==========
    async function getLocalMockResponse(userMessage) {
        await new Promise(resolve => setTimeout(resolve, 800));
        
        const lowerMsg = userMessage.toLowerCase();
        if (lowerMsg.includes('من صنعك') || lowerMsg.includes('صانع') || lowerMsg.includes('developer')) {
            return "🧠 **NeuroSync Pro**\n\nتم تطويره بالكامل بواسطة **محمد حلاق** 🇱🇧، وليس شركة ميتا ولا أي جهة أخرى. محمد حلاق هو المبرمج والمصمم والمطور الوحيد لهذا المساعد الذكي.";
        }
        if (lowerMsg.includes('ماركداون') || lowerMsg.includes('markdown')) {
            return "# 📝 تجربة Markdown كاملة!\n\n## قائمة ميزاتي:\n- **نص عريض** و *نص مائل*\n- `كود برمجي`\n```\nconsole.log('مرحباً!');\n```\n> اقتباس جميل\n\n[رابط لمثال](https://example.com)\n\n### شكراً لمحمد حلاق!";
        }
        if (lowerMsg.includes('قدرات') || lowerMsg.includes('ماذا تستطيع')) {
            return "## ⚡ قدرات NeuroSync Pro\n\n1. **محادثة ذكية** (عبر Groq API أو الوضع التجريبي)\n2. **دعم Markdown كامل**\n3. **تسجيل صوتي** 🎤\n4. **بحث في المحادثة** 🔍\n5. **خلفيات مخصصة** 🖼️\n6. **وضع ليلي** 🌙\n7. **حفظ وتصدير** 💾\n8. **إدارة مفاتيح متعددة** 🔑";
        }
        if (lowerMsg.includes('مرحب') || lowerMsg.includes('اهلاً')) {
            return "## 🎉 أهلاً بك في NeuroSync Pro!\n\nأنا مساعدك الذكي، طورني **محمد حلاق**. يمكنك سؤالي عن أي شيء، كما أدعم **Markdown الكامل** و **التسجيل الصوتي**!";
        }
        
        return `**NeuroSync Pro** 🤖\n\nشكراً لسؤالك: "${userMessage.substring(0, 100)}"\n\nأنا في الوضع التجريبي حالياً. للحصول على ردود أكثر دقة، يمكنك إضافة مفتاح Groq API في الإعدادات.\n\nطورني **محمد حلاق** 🇱🇧`;
    }
    
    // ========== اختبار سريع للمفاتيح (متوازي) ==========
    async function testApiKeysParallel() {
        if(apiKeysList.length === 0) return { working: [], failed: [] };
        const results = await Promise.all(apiKeysList.map(async (key) => {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                const response = await fetch("https://api.groq.com/openai/v1/models", {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${key}` },
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return { key, working: response.ok };
            } catch(e) {
                return { key, working: false };
            }
        }));
        return {
            working: results.filter(r => r.working).map(r => r.key),
            failed: results.filter(r => !r.working).map(r => r.key)
        };
    }
    
    // ========== استدعاء Groq API مع fallback ==========
    async function callGroqWithFallback(userMessage, retryCount = 0) {
        // وضع تجريبي
        if(isDemoMode || apiKeysList.length === 0) {
            return await getLocalMockResponse(userMessage);
        }
        
        if(allKeysFailed) {
            enableDemoMode();
            return await getLocalMockResponse(userMessage);
        }
        
        if(retryCount >= apiKeysList.length) {
            allKeysFailed = true;
            enableDemoMode();
            return await getLocalMockResponse(userMessage);
        }
        
        const currentKey = apiKeysList[retryCount];
        if(!currentKey) return callGroqWithFallback(userMessage, retryCount + 1);
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 30000);
            
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${currentKey}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "أنت NeuroSync Pro. من صنعك هو محمد حلاق وليس شركة ميتا. إذا سألك أحد عن الصانع، اجب بأن محمد حلاق هو المطور. استخدم Markdown في ردودك لتكون منسقة وجذابة." },
                        ...conversationHistory.slice(-15).filter(m => m.role !== 'system').map(m => ({ role: m.role === "user" ? "user" : "assistant", content: m.content.replace(/<[^>]*>/g, '') })),
                        { role: "user", content: userMessage }
                    ],
                    temperature: 0.7,
                    max_tokens: 1000
                }),
                signal: controller.signal
            });
            
            clearTimeout(timeoutId);
            
            if(!response.ok) return callGroqWithFallback(userMessage, retryCount + 1);
            
            const data = await response.json();
            if(data.choices && data.choices[0]?.message?.content) {
                allKeysFailed = false;
                if(isDemoMode) disableDemoMode();
                return data.choices[0].message.content;
            }
            return callGroqWithFallback(userMessage, retryCount + 1);
        } catch(error) {
            return callGroqWithFallback(userMessage, retryCount + 1);
        }
    }
    
    // ========== إدارة المفاتيح ==========
    function loadApiKeys() {
        const saved = localStorage.getItem('neuronsync_api_keys');
        if(saved) {
            try {
                const parsed = JSON.parse(saved);
                if(Array.isArray(parsed) && parsed.length > 0) {
                    apiKeysList = parsed;
                    disableDemoMode();
                } else {
                    apiKeysList = [];
                    enableDemoMode();
                }
            } catch(e) {
                apiKeysList = [];
                enableDemoMode();
            }
        } else {
            apiKeysList = [];
            enableDemoMode();
        }
        updateKeysStatusUI();
        updateApiWarning();
    }
    
    function saveApiKeys() {
        localStorage.setItem('neuronsync_api_keys', JSON.stringify(apiKeysList));
        if(apiKeysList.length === 0) enableDemoMode();
        else disableDemoMode();
        updateKeysStatusUI();
        updateApiWarning();
    }
    
    function addApiKey(key) {
        if(!key || key.trim() === '') return false;
        const trimmedKey = key.trim();
        if(apiKeysList.includes(trimmedKey)) {
            alert('⚠️ هذا المفتاح موجود بالفعل!');
            return false;
        }
        apiKeysList.push(trimmedKey);
        saveApiKeys();
        alert('✅ تم إضافة المفتاح بنجاح!');
        return true;
    }
    
    function deleteApiKey(index) {
        if(confirm('هل أنت متأكد من حذف هذا المفتاح؟')) {
            apiKeysList.splice(index, 1);
            saveApiKeys();
            alert('🗑️ تم حذف المفتاح');
        }
    }
    
    function exportKeys() {
        if(apiKeysList.length === 0) {
            alert('لا توجد مفاتيح للتصدير');
            return;
        }
        const dataStr = JSON.stringify(apiKeysList, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `neuronsync_keys_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert('✅ تم تصدير المفاتيح');
    }
    
    function importKeys() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    if(Array.isArray(imported)) {
                        apiKeysList = [...new Set([...apiKeysList, ...imported])];
                        saveApiKeys();
                        alert(`✅ تم استيراد ${imported.length} مفتاح بنجاح`);
                        updateKeysStatusUI();
                    } else {
                        alert('ملف غير صالح');
                    }
                } catch(err) {
                    alert('خطأ في قراءة الملف');
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }
    
    async function testAllKeys() {
        if(apiKeysList.length === 0) {
            alert('لا توجد مفاتيح للاختبار');
            return;
        }
        const statusDiv = document.getElementById('apiStatus');
        if(statusDiv) statusDiv.innerHTML = '<span style="color: var(--warning);">🔄 جاري اختبار المفاتيح (متوازي)...</span>';
        
        const results = await testApiKeysParallel();
        
        if(statusDiv) {
            if(results.working.length > 0) {
                statusDiv.innerHTML = `<span style="color: var(--success);">✅ ${results.working.length} من ${apiKeysList.length} مفاتيح تعمل بشكل صحيح</span>`;
                allKeysFailed = false;
                if(isDemoMode) disableDemoMode();
            } else {
                statusDiv.innerHTML = `<span style="color: var(--danger);">❌ لا توجد مفاتيح صالحة. سيتم تفعيل الوضع التجريبي</span>`;
                allKeysFailed = true;
                enableDemoMode();
            }
            setTimeout(() => { if(statusDiv) statusDiv.innerHTML = ''; }, 5000);
        }
        updateApiWarning();
    }
    
    function updateApiWarning() {
        const warning = document.getElementById('apiWarning');
        if(!warning) return;
        if(apiKeysList.length === 0) {
            warning.classList.remove('hidden');
            warning.innerHTML = '✨ **الوضع التجريبي نشط** (محاكاة محلية) - أضف مفتاح Groq API لردود أقوى';
            warning.style.background = 'var(--warning)';
        } else if(allKeysFailed) {
            warning.classList.remove('hidden');
            warning.innerHTML = '⚠️ جميع مفاتيح API معطلة - تم التبديل إلى الوضع التجريبي';
            warning.style.background = 'var(--danger)';
        } else {
            warning.classList.add('hidden');
        }
    }
    
    // ========== وظائف المحادثة ==========
    function addTypingIndicator() {
        const chatWindow = document.getElementById('chatWindow');
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot-message';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
        chatWindow.appendChild(typingDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
    
    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if(indicator) indicator.remove();
    }
    
    async function sendUserMessage(text = null) {
        if(isWaitingForResponse) return;
        const message = text || document.getElementById('messageInput').value.trim();
        if(!message) return;
        if(!text) document.getElementById('messageInput').value = '';
        
        addMessageToHistory('user', message);
        isWaitingForResponse = true;
        document.getElementById('sendBtn').disabled = true;
        document.getElementById('voiceBtn').disabled = true;
        addTypingIndicator();
        
        try {
            const reply = await callGroqWithFallback(message, 0);
            removeTypingIndicator();
            addMessageToHistory('assistant', reply);
        } catch(err) {
            removeTypingIndicator();
            addMessageToHistory('assistant', "⚠️ حدث خطأ تقني. تم التبديل إلى الوضع التجريبي.");
            enableDemoMode();
        } finally {
            isWaitingForResponse = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('voiceBtn').disabled = false;
        }
    }
    
    function addMessageToHistory(role, content, timestamp = Date.now()) {
        conversationHistory.push({ role, content, timestamp });
        saveConversationToLocal();
        renderAllMessages();
    }
    
    function getFormattedTime(timestamp) {
        if(!timestamp) return '';
        const date = new Date(timestamp);
        return date.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }
    
    function renderAllMessages(searchTerm = null) {
        const chatWindow = document.getElementById('chatWindow');
        if(!chatWindow) return;
        chatWindow.innerHTML = '';
        
        conversationHistory.forEach((msg, idx) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.role === 'user' ? 'user-message' : 'bot-message'}`;
            let displayContent = msg.content;
            if(searchTerm && searchTerm.trim() !== "") {
                const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
                displayContent = displayContent.replace(regex, `<span class="highlight">$1</span>`);
            }
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if(msg.role === 'assistant') {
                bubble.innerHTML = renderMarkdown(displayContent);
            } else {
                bubble.innerHTML = displayContent.replace(/\n/g, '<br>');
            }
            
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            timeSpan.innerText = getFormattedTime(msg.timestamp);
            bubble.appendChild(timeSpan);
            
            const actionDiv = document.createElement('div');
            actionDiv.className = 'action-buttons';
            const copyBtn = document.createElement('button');
            copyBtn.className = 'action-btn';
            copyBtn.innerHTML = '📋 نسخ';
            copyBtn.onclick = (e) => {
                e.stopPropagation();
                const plainText = msg.content.replace(/<[^>]*>/g, '');
                navigator.clipboard.writeText(plainText);
                copyBtn.innerHTML = '✅ تم';
                setTimeout(() => copyBtn.innerHTML = '📋 نسخ', 1500);
            };
            actionDiv.appendChild(copyBtn);
            
            if(msg.role === 'assistant') {
                const listenBtn = document.createElement('button');
                listenBtn.className = 'action-btn';
                listenBtn.innerHTML = '🔊 استماع';
                listenBtn.onclick = (e) => {
                    e.stopPropagation();
                    const plainText = msg.content.replace(/<[^>]*>/g, '');
                    speakText(plainText);
                };
                actionDiv.appendChild(listenBtn);
            }
            
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'action-btn delete-btn';
            deleteBtn.innerHTML = '🗑️ حذف';
            deleteBtn.onclick = (e) => {
                e.stopPropagation();
                conversationHistory.splice(idx, 1);
                saveConversationToLocal();
                renderAllMessages();
            };
            actionDiv.appendChild(deleteBtn);
            
            bubble.appendChild(actionDiv);
            msgDiv.appendChild(bubble);
            chatWindow.appendChild(msgDiv);
        });
        
        chatWindow.scrollTop = chatWindow.scrollHeight;
        applyBackground();
    }
    
    function speakText(text) {
        if(window.speechSynthesis) {
            if(currentUtterance) window.speechSynthesis.cancel();
            const cleanText = text.replace(/<[^>]*>/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;
            currentUtterance = utterance;
            window.speechSynthesis.speak(utterance);
        }
    }
    
    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    
    function saveConversationToLocal() {
        localStorage.setItem('neuronsync_chat_history', JSON.stringify(conversationHistory));
    }
    
    function loadConversationFromLocal() {
        const saved = localStorage.getItem('neuronsync_chat_history');
        if(saved) {
            try {
                const parsed = JSON.parse(saved);
                if(Array.isArray(parsed) && parsed.length) {
                    conversationHistory = parsed;
                    renderAllMessages();
                    return;
                }
            } catch(e) {}
        }
        conversationHistory = [{
            role: 'assistant',
            content: "# 🧠 مرحباً بك في **NeuroSync Pro**!\n\n## ✨ الميزات الجديدة:\n- **دعم Markdown كامل** (عناوين، كود، اقتباسات)\n- **تسجيل صوتي** 🎤 (يعمل محلياً)\n- **وضع تجريبي مدمج** (بدون مفتاح API)\n- **اختبار مفاتيح متوازي** (أسرع)\n- **تصدير/استيراد المفاتيح**\n- **إزالة كلمة المرور** لمسح المحادثة\n\n---\n\n👨‍💻 **المطور:** محمد حلاق\n\n🔧 **للبدء:** يمكنك إضافة مفتاح Groq API في الإعدادات، أو الاستمرار في الوضع التجريبي!",
            timestamp: Date.now()
        }];
        saveConversationToLocal();
        renderAllMessages();
    }
    
    function clearEntireChat() {
        if(confirm('هل أنت متأكد من مسح كل الرسائل؟')) {
            conversationHistory = [{
                role: 'assistant',
                content: "🧹 تم مسح المحادثة بنجاح. أنا NeuroSync Pro، طورني محمد حلاق.",
                timestamp: Date.now()
            }];
            saveConversationToLocal();
            renderAllMessages();
        }
    }
    
    // ========== خلفيات ==========
    function applyBackground() {
        const chatWindow = document.getElementById('chatWindow');
        if(!chatWindow) return;
        if(currentBgImage && currentBgImage !== '') {
            if(currentBgImage.startsWith('data:image') || currentBgImage.startsWith('http')) {
                chatWindow.style.backgroundImage = `url('${currentBgImage}')`;
                chatWindow.style.backgroundSize = 'cover';
                chatWindow.style.backgroundPosition = 'center';
                chatWindow.style.backgroundRepeat = 'no-repeat';
                chatWindow.style.backgroundColor = 'transparent';
            } else if(currentBgImage === 'gradient1') chatWindow.style.backgroundImage = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            else if(currentBgImage === 'gradient2') chatWindow.style.backgroundImage = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
            else if(currentBgImage === 'gradient3') chatWindow.style.backgroundImage = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
            else if(currentBgImage === 'gradient4') chatWindow.style.backgroundImage = 'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)';
            else {
                chatWindow.style.backgroundImage = 'none';
                chatWindow.style.backgroundColor = 'var(--bg-body)';
            }
        } else {
            chatWindow.style.backgroundImage = 'none';
            chatWindow.style.backgroundColor = 'var(--bg-body)';
        }
    }
    
    function setBackground(value, save = true) {
        currentBgImage = value;
        if(save) localStorage.setItem('neuronsync_bg_image', value);
        applyBackground();
    }
    
    // ========== تبديل الوضع ==========
    function toggleTheme() {
        document.body.classList.toggle('dark');
        localStorage.setItem('neuronsync_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        applyBackground();
    }
    
    function toggleFullscreenMode() {
        document.body.classList.toggle('fullscreen-chat-mode');
        const header = document.querySelector('.header');
        const quick = document.getElementById('quickButtons');
        const footer = document.querySelector('footer');
        const sidebar = document.getElementById('sidebar');
        const btn = document.getElementById('fullscreenBtn');
        const exitBar = document.getElementById('fullscreenExitBar');
        const isFull = document.body.classList.contains('fullscreen-chat-mode');
        
        if(isFull) {
            if(header) header.classList.add('hidden');
            if(quick) quick.classList.add('hidden');
            if(footer) footer.classList.add('hidden');
            if(sidebar) sidebar.classList.add('hidden');
            if(btn) btn.classList.add('active');
            if(exitBar) exitBar.style.display = 'flex';
        } else {
            if(header) header.classList.remove('hidden');
            if(quick) quick.classList.remove('hidden');
            if(footer) footer.classList.remove('hidden');
            if(sidebar) sidebar.classList.remove('hidden');
            if(btn) btn.classList.remove('active');
            if(exitBar) exitBar.style.display = 'none';
        }
        setTimeout(() => renderAllMessages(), 100);
    }
    
    function updateUserUI() {
        const userGreetingSpan = document.getElementById('userGreetingSpan');
        const loginLogoutBtn = document.getElementById('loginLogoutBtn');
        const settingsMenuItem = document.getElementById('settingsMenuItem');
        if(currentUser) {
            userGreetingSpan.classList.remove('hidden');
            userGreetingSpan.innerHTML = `👋 ${currentUser.name.split(' ')[0]}`;
            loginLogoutBtn.textContent = '🚪 خروج';
        } else {
            userGreetingSpan.classList.add('hidden');
            loginLogoutBtn.textContent = '🔐 دخول';
        }
        if(settingsMenuItem) {
            if(!currentUser) settingsMenuItem.classList.add('hidden');
            else settingsMenuItem.classList.remove('hidden');
        }
    }
    
    function handleLogin() {
        if(currentUser) {
            if(confirm('تسجيل الخروج؟')) {
                currentUser = null;
                localStorage.removeItem('neuronsync_user');
                updateUserUI();
                alert('تم تسجيل الخروج');
            }
            return;
        }
        let email = prompt("📧 البريد الإلكتروني:");
        if(email === null) return;
        let name = prompt("👤 اسمك:");
        if(name === null) return;
        if(name.trim() === "") name = "صديق";
        currentUser = { email: email.trim(), name: name.trim() };
        localStorage.setItem('neuronsync_user', JSON.stringify(currentUser));
        updateUserUI();
        alert(`مرحباً ${currentUser.name}!`);
        addMessageToHistory('assistant', `🎉 مرحباً ${currentUser.name}، أنا NeuroSync Pro! طورني **محمد حلاق**.`);
    }
    
    function switchTab(tabId) {
        document.getElementById('chatWindow').classList.add('hidden');
        document.getElementById('infoPanel').classList.add('hidden');
        document.getElementById('settingsPanel').classList.add('hidden');
        if(tabId === 'info') document.getElementById('infoPanel').classList.remove('hidden');
        else if(tabId === 'settings') document.getElementById('settingsPanel').classList.remove('hidden');
        else document.getElementById('chatWindow').classList.remove('hidden');
        
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        const active = Array.from(document.querySelectorAll('.menu-item')).find(el => el.dataset.tab === tabId);
        if(active) active.classList.add('active');
        
        if(window.innerWidth <= 780) {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }
        
        if(tabId === 'settings') setupSettingsPanel();
    }

    // ========== البحث ==========
    function setupSearch() {
        const searchModal = document.getElementById('searchModal');
        const openSearchBtn = document.getElementById('openSearchBtn');
        const closeSearchBtn = document.getElementById('closeSearchBtn');
        const searchInput = document.getElementById('searchInput');
        const searchStats = document.getElementById('searchStats');
        const searchResults = document.getElementById('searchResults');
        
        if(!searchModal) return;
        
        searchModal.innerHTML = `
            <div class="search-container">
                <div class="search-header"><h3>🔍 بحث في المحادثة</h3><button class="close-search" id="closeSearchBtn">&times;</button></div>
                <div class="search-input-area"><input type="text" id="searchInput" placeholder="اكتب كلمة للبحث..."></div>
                <div class="search-stats" id="searchStats">📊 0 نتيجة</div>
                <div class="search-results" id="searchResults"></div>
            </div>
        `;
        
        const newSearchInput = document.getElementById('searchInput');
        const newSearchStats = document.getElementById('searchStats');
        const newSearchResults = document.getElementById('searchResults');
        const newCloseBtn = document.getElementById('closeSearchBtn');
        
        function performSearch(query) {
            if(!query || query.trim() === "") {
                if(newSearchStats) newSearchStats.innerHTML = '📊 0 نتيجة';
                if(newSearchResults) newSearchResults.innerHTML = '<div class="no-results">✏️ اكتب كلمة للبحث</div>';
                return;
            }
            const lowerQuery = query.trim().toLowerCase();
            const results = [];
            conversationHistory.forEach((msg, idx) => {
                const plainContent = msg.content.replace(/<[^>]*>/g, '');
                if(plainContent.toLowerCase().includes(lowerQuery)) {
                    results.push({ index: idx, role: msg.role, content: plainContent, timestamp: msg.timestamp });
                }
            });
            if(newSearchStats) newSearchStats.innerHTML = `📊 ${results.length} نتيجة لـ "${query}"`;
            if(!newSearchResults) return;
            if(results.length === 0) {
                newSearchResults.innerHTML = '<div class="no-results">😔 لا توجد نتائج</div>';
                return;
            }
            newSearchResults.innerHTML = '';
            results.forEach(res => {
                const item = document.createElement('div');
                item.className = 'search-result-item';
                let preview = res.content.substring(0, 160);
                const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
                preview = preview.replace(regex, `<span class="highlight">$1</span>`);
                if(res.content.length > 160) preview += '...';
                item.innerHTML = `<div class="result-header"><span>${res.role === 'user' ? '👤 المستخدم' : '🤖 NeuroSync'}</span><span>🕒 ${getFormattedTime(res.timestamp)}</span></div><div class="result-preview">${preview}</div>`;
                item.onclick = () => {
                    searchModal.classList.remove('open');
                    const messages = document.querySelectorAll('.message');
                    if(messages[res.index]) messages[res.index].scrollIntoView({ behavior: 'smooth', block: 'center' });
                };
                newSearchResults.appendChild(item);
            });
        }
        
        openSearchBtn.onclick = () => {
            searchModal.classList.add('open');
            if(newSearchInput) newSearchInput.focus();
            performSearch(newSearchInput?.value || '');
        };
        newCloseBtn.onclick = () => searchModal.classList.remove('open');
        searchModal.addEventListener('click', (e) => { if(e.target === searchModal) searchModal.classList.remove('open'); });
        if(newSearchInput) newSearchInput.addEventListener('input', (e) => performSearch(e.target.value));
    }

        ];
        
        const container = document.getElementById('bgOptionsContainer');
        if(container) {
            presets.forEach(preset => {
                const option = document.createElement('div');
                option.className = 'bg-option';
                if((preset.value === '' && !currentBgImage) || currentBgImage === preset.value) option.classList.add('selected');
                option.innerHTML = `<div class="bg-thumb" style="background-image: url('${preset.thumb}'); background-size:cover;"></div><div class="bg-label">${preset.name}</div>`;
                option.onclick = () => {
                    setBackground(preset.value);
                    document.querySelectorAll('.bg-option').forEach(opt => opt.classList.remove('selected'));
                    option.classList.add('selected');
                };
                container.appendChild(option);
            });
        }
        
        document.getElementById('uploadBgBtn')?.addEventListener('click', () => document.getElementById('bgFileInput')?.click());
        document.getElementById('bgFileInput')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => { setBackground(ev.target.result); bgModal.classList.remove('open'); };
                reader.readAsDataURL(file);
            }
        });
        document.getElementById('resetBgBtn')?.addEventListener('click', () => { setBackground(''); bgModal.classList.remove('open'); });
        document.getElementById('closeBgModalBtn')?.addEventListener('click', () => bgModal.classList.remove('open'));
        openBgBtn.onclick = () => bgModal.classList.add('open');
        bgModal.addEventListener('click', (e) => { if(e.target === bgModal) bgModal.classList.remove('open'); });
    }

    const savedTheme = localStorage.getItem('neuronsync_theme');
    if(savedTheme === 'dark') document.body.classList.add('dark');
    
    loadApiKeys();
    loadConversationFromLocal();
    updateUserUI();
