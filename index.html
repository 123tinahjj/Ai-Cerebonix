<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>NeuroSync Pro - نظام إدارة مفاتيح متطور</title>
    <!-- Marked.js لدعم Markdown كامل -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- DOMPurify للأمان -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap');

        :root {
            --bg-body: #f5f7fb;
            --card-bg: #ffffff;
            --surface: #ffffff;
            --border-light: #e9eef3;
            --text-primary: #1e2a3e;
            --text-secondary: #5b6e8c;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --message-user-bg: #6366f1;
            --message-user-text: white;
            --message-bot-bg: #f1f5f9;
            --message-bot-text: #1e2a3e;
            --font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --faq-hover: #e0e7ff;
            --delete-btn-bg: #fee2e2;
            --delete-btn-hover: #fecaca;
            --time-stamp: #94a3b8;
            --highlight-bg: #fde047;
            --highlight-text: #1e2a3e;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --base-font-size: 13px;
        }

        body.dark {
            --bg-body: #0f172a;
            --card-bg: #1e293b;
            --surface: #1e293b;
            --border-light: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --message-bot-bg: #334155;
            --message-bot-text: #f1f5f9;
            --faq-hover: #334155;
            --delete-btn-bg: #7f1d1d;
            --delete-btn-hover: #991b1b;
            --time-stamp: #cbd5e1;
            --highlight-bg: #eab308;
            --highlight-text: #1e293b;
        }

        body {
            background: var(--bg-body);
            font-family: var(--font-family);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            font-size: var(--base-font-size);
        }

        /* تحكم في حجم الخط العام */
        body.font-small { --base-font-size: 11px; }
        body.font-medium { --base-font-size: 13px; }
        body.font-large { --base-font-size: 16px; }
        body.font-xlarge { --base-font-size: 19px; }

        /* إعادة تعريف أحجام الفقاعات لاستخدام 1rem (يعتمد على body) */
        .bubble, .bubble p, .bubble li, .bubble div, .bubble span, .bubble h1, .bubble h2, .bubble h3, .bubble h4 {
            font-size: 1rem;
        }

        .app-container {
            max-width: 100%;
            margin: 0;
            background: var(--card-bg);
            border-radius: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            border: none;
        }

        @media (min-width: 1024px) {
            body {
                padding: 12px;
                background: var(--bg-body);
            }
            .app-container {
                max-width: 1400px;
                margin: 0 auto;
                border-radius: 40px;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
                border: 1px solid var(--border-light);
                height: calc(100vh - 24px);
            }
        }

        @media (max-width: 1023px) {
            .app-container {
                border-radius: 0;
                height: 100vh;
            }
            body {
                padding: 0;
            }
        }

        /* شاشة تسجيل الدخول */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-body);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }
        .auth-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 28px 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.3);
            border: 1px solid var(--border-light);
            text-align: center;
        }
        .auth-card h2 {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-input {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border-radius: 28px;
            border: 1px solid var(--border-light);
            background: var(--surface);
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
        }
        .auth-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 32px;
            font-weight: bold;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
            font-size: 1rem;
        }
        .auth-error {
            color: var(--danger);
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .header {
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 15;
        }

        .fullscreen-exit-bar {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            z-index: 10000;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.25);
            padding: 0;
        }
        .fullscreen-exit-bar button {
            background: transparent;
            border: none;
            padding: 8px 12px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .fullscreen-exit-bar button:hover {
            background: rgba(255,255,255,0.2);
        }
        body.fullscreen-chat-mode .fullscreen-exit-bar {
            display: flex;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            background: var(--accent);
            width: 34px;
            height: 34px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 1.1rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            background: linear-gradient(135deg, #10b981, #059669);
            padding: 2px 6px;
            border-radius: 16px;
            font-size: 0.55rem;
            font-weight: 600;
            color: white;
            margin-right: 6px;
        }

        .demo-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .controls {
            display: flex;
            gap: 5px;
            align-items: center;
            flex-wrap: wrap;
        }

        .icon-btn {
            background: var(--border-light);
            border: none;
            padding: 5px 8px;
            border-radius: 24px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-primary);
            cursor: pointer;
            transition: 0.2s;
        }

        .icon-btn:hover:not(:disabled) {
            background: var(--accent);
            color: white;
        }

        .font-controls {
            display: inline-flex;
            gap: 3px;
            background: var(--border-light);
            border-radius: 24px;
            padding: 2px 4px;
        }
        .font-controls .icon-btn {
            background: transparent;
            padding: 4px 8px;
            font-size: 0.8rem;
        }

        .search-btn {
            background: var(--accent);
            color: white;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: 260px;
            background: var(--surface);
            border-left: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.25s ease;
            z-index: 20;
        }

        .menu-item {
            padding: 10px 16px;
            margin: 4px 8px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8rem;
            color: var(--text-secondary);
            transition: 0.15s;
        }

        .menu-item.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .menu-item:hover:not(.active) {
            background: var(--border-light);
            color: var(--text-primary);
        }

        .content-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
        }

        .message {
            display: flex;
            animation: fadeSlide 0.25s ease;
            position: relative;
            gap: 5px;
            align-items: flex-end;
            z-index: 2;
        }

        .user-message {
            justify-content: flex-end;
        }

        .bot-message {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 85%;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 1rem;
            line-height: 1.45;
            word-break: break-word;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .user-message .bubble {
            background: var(--message-user-bg);
            color: var(--message-user-text);
            border-bottom-right-radius: 4px;
        }

        .bot-message .bubble {
            background: var(--message-bot-bg);
            color: var(--message-bot-text);
            border-bottom-left-radius: 4px;
        }
        
        .bubble a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed var(--accent);
        }
        
        .bubble code {
            background: rgba(0,0,0,0.1);
            padding: 2px 5px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9em;
        }
        
        .bubble pre {
            background: rgba(0,0,0,0.1);
            padding: 8px;
            border-radius: 10px;
            overflow-x: auto;
            margin: 6px 0;
            font-size: 0.9rem;
        }
        
        .bubble blockquote {
            border-right: 3px solid var(--accent);
            padding-right: 10px;
            margin: 6px 0;
            color: var(--text-secondary);
        }

        .bubble h1, .bubble h2, .bubble h3, .bubble h4 {
            margin: 8px 0 4px 0;
        }
        .bubble h1 { font-size: 1.4rem; }
        .bubble h2 { font-size: 1.2rem; }
        .bubble h3 { font-size: 1.05rem; }
        
        .message-time {
            font-size: 0.7rem;
            color: var(--time-stamp);
            margin-top: 5px;
            direction: ltr;
            text-align: right;
            opacity: 0.8;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            justify-content: flex-start;
        }

        .action-btn {
            background: var(--border-light);
            border: none;
            border-radius: 18px;
            padding: 3px 8px;
            font-size: 0.65rem;
            cursor: pointer;
            color: var(--text-primary);
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .action-btn.delete-btn {
            background: var(--delete-btn-bg);
            color: #b91c1c;
        }

        .input-area {
            padding: 8px 12px;
            background: var(--surface);
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 6px;
            align-items: center;
            z-index: 10;
        }

        .input-area input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 32px;
            border: 1px solid var(--border-light);
            background: var(--bg-body);
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
        }

        .send-btn, .voice-btn {
            background: var(--accent);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 22px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .voice-btn { background: #3b82f6; }
        .voice-btn.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }

        .info-panel, .settings-panel {
            padding: 16px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .hidden {
            display: none !important;
        }

        .menu-toggle {
            display: none;
            background: var(--border-light);
            border: none;
            font-size: 1.2rem;
            padding: 5px 8px;
            border-radius: 22px;
            cursor: pointer;
            color: var(--text-primary);
        }

        @media (max-width: 780px) {
            .menu-toggle {
                display: block;
            }
            .sidebar {
                position: fixed;
                right: -280px;
                top: 60px;
                bottom: 0;
                z-index: 1000;
                background: var(--card-bg);
                width: 250px;
                border-radius: 20px 0 0 20px;
                box-shadow: -5px 0 20px rgba(0,0,0,0.3);
            }
            .sidebar.open {
                right: 0;
            }
            .overlay {
                display: none;
                position: fixed;
                top:0; left:0; right:0; bottom:0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
            }
            .overlay.open {
                display: block;
            }
        }

        footer {
            font-size: 0.6rem;
            text-align: center;
            padding: 5px;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-light);
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quick-buttons {
            display: flex;
            gap: 6px;
            padding: 6px 12px;
            overflow-x: auto;
            background: var(--surface);
            border-bottom: 1px solid var(--border-light);
            scrollbar-width: thin;
            z-index: 8;
        }
        
        .quick-chip {
            background: var(--border-light);
            padding: 4px 10px;
            border-radius: 28px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
            color: var(--text-primary);
            transition: 0.2s;
            user-select: none;
        }
        
        .quick-chip:hover {
            background: var(--accent);
            color: white;
        }

        .search-modal, .bg-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .search-modal.open, .bg-modal.open {
            display: flex;
        }
        .search-container, .bg-picker {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 16px;
            width: 90%;
            max-width: 450px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .bg-options {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 8px;
            margin: 12px 0;
        }
        .bg-option {
            background: var(--border-light);
            border-radius: 10px;
            padding: 6px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
        }
        .bg-option.selected {
            border-color: var(--accent);
        }
        .key-item {
            background: var(--border-light);
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-success {
            background: var(--success);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-warning {
            background: var(--warning);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 10px;
            cursor: pointer;
        }
        .typing-indicator {
            display: flex;
            gap: 3px;
            padding: 8px 14px;
            background: var(--message-bot-bg);
            border-radius: 20px;
            width: fit-content;
        }
        .highlight {
            background: var(--highlight-bg);
            color: var(--highlight-text);
            padding: 0 2px;
            border-radius: 3px;
        }
        .api-warning {
            padding: 4px 12px;
            text-align: center;
            font-size: 0.7rem;
            background: var(--warning);
            color: white;
        }
        .creator-credit {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 2px 8px;
            border-radius: 16px;
            font-size: 0.65rem;
            color: white;
            margin-right: 8px;
        }
        .greeting-user {
            background: var(--border-light);
            border-radius: 20px;
            padding: 3px 8px;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer" style="display: none;">
    <!-- كل واجهة التطبيق الرئيسية -->
    <div class="header">
        <div class="logo-area">
            <div class="logo-icon">🧠</div>
            <div class="logo-text">NeuroSync Pro</div>
            <span class="badge" id="modeBadge">🔐 API</span>
            <span class="creator-credit">🇱🇧 محمد حلاق</span>
        </div>
        <div class="controls">
            <div class="font-controls">
                <button class="icon-btn" id="fontDecreaseBtn" title="تصغير الخط">A-</button>
                <button class="icon-btn" id="fontIncreaseBtn" title="تكبير الخط">A+</button>
            </div>
            <span id="userGreetingSpan" class="greeting-user"></span>
            <button id="logoutHeaderBtn" class="icon-btn">🚪 خروج</button>
            <button class="icon-btn menu-toggle" id="menuToggleBtn">☰</button>
            <button class="icon-btn search-btn" id="openSearchBtn">🔍 بحث</button>
            <button class="icon-btn bg-btn" id="openBgBtn">🖼️ خلفية</button>
            <button class="icon-btn lang-btn" id="langToggleBtn">🌐 EN</button>
            <button class="icon-btn" id="themeToggleBtn">🌓 وضع</button>
            <button class="icon-btn" id="clearChatBtn">🗑️ مسح</button>
            <button class="icon-btn" id="saveChatBtn">💾 حفظ</button>
            <button class="icon-btn fullscreen-btn" id="fullscreenBtn">⛶ ملء</button>
        </div>
    </div>
    <div class="fullscreen-exit-bar" id="fullscreenExitBar"><button id="exitFullscreenBtn">↖️ خروج</button></div>
    <div class="main-layout">
        <div class="sidebar" id="sidebar">
            <div class="menu-item active" data-tab="chat">💬 المحادثة</div>
            <div class="menu-item" data-tab="info">ℹ️ معلومات</div>
            <div class="menu-item" data-tab="settings">⚙️ إدارة المفاتيح</div>
        </div>
        <div id="overlay" class="overlay"></div>
        <div class="content-panel">
            <div id="apiWarning" class="api-warning hidden"></div>
            <div class="quick-buttons" id="quickButtons"></div>
            <div class="chat-window" id="chatWindow"></div>
            <div id="infoPanel" class="info-panel hidden"></div>
            <div id="settingsPanel" class="settings-panel hidden"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="اسألني أي شيء... أنا NeuroSync Pro" autocomplete="off">
                <button class="voice-btn" id="voiceBtn" title="تسجيل صوتي">🎤</button>
                <button class="send-btn" id="sendBtn">➤</button>
            </div>
            <footer>🧠 NeuroSync Pro | يدعم Markdown كامل | وضع تجريبي مدمج | 🇱🇧 تم التطوير بواسطة محمد حلاق</footer>
        </div>
    </div>
</div>

<!-- شاشة تسجيل الدخول -->
<div id="authScreen" class="auth-screen">
    <div class="auth-card">
        <div class="logo-icon" style="margin:0 auto 12px; width:50px; height:50px; font-size:28px;">🧠</div>
        <h2>NeuroSync Pro</h2>
        <p style="margin-bottom:12px;">يرجى تسجيل الدخول للمتابعة</p>
        <input type="email" id="loginEmail" class="auth-input" placeholder="البريد الإلكتروني" autocomplete="email">
        <input type="password" id="loginPassword" class="auth-input" placeholder="كلمة المرور">
        <button id="doLoginBtn" class="auth-btn">دخول</button>
        <div id="authErrorMsg" class="auth-error"></div>
        <div style="margin-top:16px; font-size:0.7rem; color:var(--text-secondary);">🧪 تجريبي: أي بريد وكلمة مرور (admin@example.com / 123456)</div>
    </div>
</div>

<script>
    // ---------- إعدادات المصادقة ----------
    let isAuthenticated = false;
    let currentUserEmail = null;
    
    // دوال تسجيل الدخول
    function checkAuthAndRender() {
        const authScreen = document.getElementById('authScreen');
        const appContainer = document.getElementById('appContainer');
        if(isAuthenticated && currentUserEmail) {
            authScreen.style.display = 'none';
            appContainer.style.display = 'flex';
            document.getElementById('userGreetingSpan').innerText = `👋 ${currentUserEmail.split('@')[0]}`;
            // إعادة تحميل البيانات
            loadConversationFromLocal();
            applyBackground();
            buildQuickButtons();
            setupSettingsPanel();
        } else {
            authScreen.style.display = 'flex';
            appContainer.style.display = 'none';
        }
    }
    
    function performLogin(email, password) {
        // لأغراض تجريبية: أي إيميل صالح وكلمة مرور 123456 أو admin@example.com/123456
        if(password === "123456" || (email === "admin@example.com" && password === "123456")) {
            isAuthenticated = true;
            currentUserEmail = email;
            localStorage.setItem('neuronsync_user', JSON.stringify({email: email, loggedIn: true}));
            checkAuthAndRender();
            initAfterLogin();
            return true;
        } else {
            document.getElementById('authErrorMsg').innerText = "❌ بيانات غير صحيحة. جرب admin@example.com / 123456";
            return false;
        }
    }
    
    function logout() {
        isAuthenticated = false;
        currentUserEmail = null;
        localStorage.removeItem('neuronsync_user');
        checkAuthAndRender();
        // مسح حالة المحادثة الظاهرية اختيارياً
        conversationHistory = [];
        saveConversationToLocal();
    }
    
    // باقي متغيرات النظام
    let currentLang = localStorage.getItem('neuronsync_lang') || 'ar';
    let apiKeysList = [];
    let isDemoMode = false;
    let conversationHistory = [];
    let isWaitingForResponse = false;
    let currentBgImage = localStorage.getItem('neuronsync_bg_image') || '';
    
    const translations = { ar: { login: "🔐 دخول", logout: "🚪 خروج", demoMode: "🧪 تجريبي", apiMode: "🔐 API", demoWarning: "✨ **الوضع التجريبي نشط** - أضف مفتاح Groq API لردود أقوى", clearConfirm: "⚠️ هل أنت متأكد من مسح كل الرسائل؟", logoutConfirm: "تسجيل الخروج؟", logoutMsg: "👋 تم تسجيل الخروج بنجاح.", welcome: (n)=> `🎉 مرحباً ${n}! أنا NeuroSync Pro.`, settingsTitle: "⚙️ إدارة مفاتيح API", addKey: "➕ إضافة مفتاح", testKeys: "🧪 اختبار المفاتيح", keyPlaceholder: "أدخل مفتاح Groq API (يبدأ بـ gsk_)", noKeys: "🧪 لا توجد مفاتيح - الوضع التجريبي نشط", typeMessage: "اسألني أي شيء... أنا NeuroSync Pro" },
        en: { login: "🔐 Login", logout: "🚪 Logout", demoMode: "🧪 Demo", apiMode: "🔐 API", demoWarning: "✨ **Demo mode active** - Add Groq API key", clearConfirm: "⚠️ Clear all messages?", logoutConfirm: "Logout?", logoutMsg: "👋 Logged out.", welcome: (n)=> `🎉 Welcome ${n}! I'm NeuroSync Pro.`, settingsTitle: "⚙️ API Keys Management", addKey: "➕ Add Key", testKeys: "🧪 Test Keys", keyPlaceholder: "Enter Groq API key (starts with gsk_)", noKeys: "🧪 No keys - Demo mode", typeMessage: "Ask me anything... NeuroSync Pro" } };
    function t(key, ...args) { let txt = translations[currentLang][key] || key; return typeof txt === 'function' ? txt(...args) : txt; }
    
    // دوال حجم الخط (تم إصلاحها)
    function setFontSize(level) { 
        document.body.classList.remove('font-small', 'font-medium', 'font-large', 'font-xlarge');
        document.body.classList.add(level);
        localStorage.setItem('neuronsync_font', level);
        // إعادة تطبيق التحديث على جميع العناصر ديناميكيًا
        document.querySelectorAll('.bubble').forEach(b => { b.style.fontSize = '1rem'; });
    }
    function changeFontSize(delta) {
        let current = localStorage.getItem('neuronsync_font') || 'font-medium';
        const sizes = ['font-small', 'font-medium', 'font-large', 'font-xlarge'];
        let idx = sizes.indexOf(current);
        if(idx === -1) idx = 1;
        let newIdx = Math.min(3, Math.max(0, idx + delta));
        setFontSize(sizes[newIdx]);
    }
    
    function buildQuickButtons() {
        const container = document.getElementById('quickButtons');
        if(!container) return;
        const questions = currentLang === 'ar' 
            ? [["🤖 من صنعك؟", "من صنعك؟"], ["🧠 ما هو NeuroSync Pro؟", "ما هو NeuroSync Pro؟"], ["👋 أهلاً بك", "أهلاً بك"], ["⚡ قدراتك", "ماذا تستطيع أن تفعل؟"], ["🗣️ اللغات", "ما هي اللغة التي تتحدثها؟"], ["💸 مجاني؟", "هل أنت مجاني؟"], ["📝 تجربة Markdown", "اخبرني عن Markdown"]]
            : [["🤖 Who made you?", "Who made you?"], ["🧠 What is NeuroSync Pro?", "What is NeuroSync Pro?"], ["👋 Welcome", "Welcome"], ["⚡ Capabilities", "What can you do?"], ["🗣️ Languages", "What languages do you speak?"], ["💸 Free?", "Are you free?"], ["📝 Markdown demo", "Tell me about Markdown"]];
        container.innerHTML = '';
        questions.forEach(([label, q]) => {
            const chip = document.createElement('div');
            chip.className = 'quick-chip';
            chip.innerHTML = label;
            chip.onclick = (e) => { e.stopPropagation(); switchTab('chat'); setTimeout(() => sendUserMessage(q), 100); };
            container.appendChild(chip);
        });
    }
    
    marked.setOptions({ breaks: true, gfm: true });
    function renderMarkdown(text) { return DOMPurify.sanitize(marked.parse(text)); }
    async function getLocalMockResponse(msg) {
        await new Promise(r=>setTimeout(r, 600));
        const lower = msg.toLowerCase();
        if(lower.includes('من صنعك') || lower.includes('who made you')) return currentLang === 'ar' ? "🧠 **NeuroSync Pro**\n\nتم تطويره بواسطة **محمد حلاق** 🇱🇧، مطور مستقل." : "🧠 **NeuroSync Pro**\n\nDeveloped by **Mohammad Hallak** 🇱🇧.";
        if(lower.includes('ما هو neurosync')) return "🧠 NeuroSync Pro هو مساعد ذكي يدعم Markdown والبحث والصوت.";
        if(lower.includes('قدرات') || lower.includes('ماذا تستطيع')) return "⚡ **قدراتي:** محادثة، Markdown، صوت، بحث، خلفيات، وضع ليلي.";
        if(lower.includes('اللغة') || lower.includes('language')) return "🌐 أتحدث العربية والإنجليزية.";
        if(lower.includes('ماركداون') || lower.includes('markdown')) return "# 📝 Markdown\n- **عريض**\n- `كود`\n> اقتباس";
        return currentLang === 'ar' ? `**NeuroSync Pro** 🤖\nالرد التجريبي: ${msg}\nأضف مفتاح API للحصول على ردود أقوى.` : `**NeuroSync Pro** 🤖\nDemo response: ${msg}\nAdd API key for better answers.`;
    }
    async function callGroqWithFallback(msg) { return await getLocalMockResponse(msg); }
    function saveConversationToLocal() { if(isAuthenticated) localStorage.setItem(`neuronsync_chat_${currentUserEmail}`, JSON.stringify(conversationHistory)); }
    function loadConversationFromLocal() { 
        if(isAuthenticated) {
            const saved = localStorage.getItem(`neuronsync_chat_${currentUserEmail}`);
            if(saved && JSON.parse(saved).length) conversationHistory = JSON.parse(saved);
            else conversationHistory = [{ role: 'assistant', content: currentLang === 'ar' ? "# 🧠 مرحباً في NeuroSync Pro!\n**محمد حلاق** المطور. اسألني أي شيء." : "# 🧠 Welcome to NeuroSync Pro!\n**Mohammad Hallak** dev. Ask me anything.", timestamp: Date.now() }];
        } else {
            conversationHistory = [];
        }
        renderAllMessages();
    }
    function addMessageToHistory(role, content, timestamp=Date.now()) { conversationHistory.push({ role, content, timestamp }); saveConversationToLocal(); renderAllMessages(); }
    function renderAllMessages() { 
        const chatWindow = document.getElementById('chatWindow');
        if(!chatWindow) return;
        chatWindow.innerHTML = '';
        conversationHistory.forEach((msg, idx) => {
            const div = document.createElement('div');
            div.className = `message ${msg.role === 'user' ? 'user-message' : 'bot-message'}`;
            const bubble = document.createElement('div'); bubble.className = 'bubble';
            if(msg.role === 'assistant') bubble.innerHTML = renderMarkdown(msg.content);
            else bubble.innerHTML = msg.content.replace(/\n/g, '<br>');
            const timeSpan = document.createElement('div'); timeSpan.className = 'message-time'; timeSpan.innerText = new Date(msg.timestamp).toLocaleTimeString();
            bubble.appendChild(timeSpan);
            const actions = document.createElement('div'); actions.className = 'action-buttons';
            const copyBtn = document.createElement('button'); copyBtn.className = 'action-btn'; copyBtn.innerHTML = '📋 نسخ';
            copyBtn.onclick = () => { navigator.clipboard.writeText(msg.content.replace(/<[^>]*>/g, '')); copyBtn.innerHTML = '✅ تم'; setTimeout(()=> copyBtn.innerHTML='📋 نسخ',1000); };
            const deleteBtn = document.createElement('button'); deleteBtn.className = 'action-btn delete-btn'; deleteBtn.innerHTML = '🗑️ حذف';
            deleteBtn.onclick = () => { if(confirm('حذف؟')) { conversationHistory.splice(idx,1); saveConversationToLocal(); renderAllMessages(); } };
            actions.appendChild(copyBtn); actions.appendChild(deleteBtn);
            bubble.appendChild(actions); div.appendChild(bubble); chatWindow.appendChild(div);
        });
        chatWindow.scrollTop = chatWindow.scrollHeight;
        applyBackground();
    }
    function applyBackground() { const w = document.getElementById('chatWindow'); if(!w) return; if(currentBgImage && currentBgImage !== '') { if(currentBgImage.startsWith('data:') || currentBgImage.startsWith('http')) w.style.backgroundImage = `url('${currentBgImage}')`; else if(currentBgImage === 'gradient1') w.style.backgroundImage = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'; else if(currentBgImage === 'gradient2') w.style.backgroundImage = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)'; else w.style.backgroundImage = 'none'; w.style.backgroundSize = 'cover'; } else { w.style.backgroundImage = 'none'; w.style.backgroundColor = 'var(--bg-body)'; } }
    async function sendUserMessage(text) { 
        if(isWaitingForResponse) return;
        const message = text || document.getElementById('messageInput').value.trim();
        if(!message) return;
        document.getElementById('messageInput').value = '';
        addMessageToHistory('user', message);
        isWaitingForResponse = true;
        document.getElementById('sendBtn').disabled = true;
        const typingDiv = document.createElement('div'); typingDiv.id = 'typingIndicator'; typingDiv.className = 'message bot-message'; typingDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span><span>✍️ جاري التفكير...</span></div>`;
        document.getElementById('chatWindow').appendChild(typingDiv);
        const reply = await callGroqWithFallback(message);
        document.getElementById('typingIndicator')?.remove();
        addMessageToHistory('assistant', reply);
        isWaitingForResponse = false;
        document.getElementById('sendBtn').disabled = false;
    }
    function clearEntireChat() { if(confirm(t('clearConfirm'))) { conversationHistory = [{ role: 'assistant', content: currentLang === 'ar' ? "🧹 تم مسح المحادثة. كيف يمكنني مساعدتك؟" : "🧹 Chat cleared. How can I help?", timestamp: Date.now() }]; saveConversationToLocal(); renderAllMessages(); } }
    function switchTab(tab) { document.getElementById('chatWindow').classList.add('hidden'); document.getElementById('infoPanel').classList.add('hidden'); document.getElementById('settingsPanel').classList.add('hidden'); if(tab === 'info') document.getElementById('infoPanel').classList.remove('hidden'); else if(tab === 'settings') document.getElementById('settingsPanel').classList.remove('hidden'); else document.getElementById('chatWindow').classList.remove('hidden'); document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active')); document.querySelector(`.menu-item[data-tab="${tab}"]`)?.classList.add('active'); }
    function setupSettingsPanel() { const panel = document.getElementById('settingsPanel'); if(!panel) return; panel.innerHTML = `<h2>${t('settingsTitle')}</h2><div id="keysStatusList"></div><input type="text" id="newApiKeyInput" placeholder="${t('keyPlaceholder')}" style="width:100%;padding:8px;"><button id="addKeyBtn" class="btn-success">${t('addKey')}</button><button id="testKeysBtn" class="btn-warning">${t('testKeys')}</button>`; document.getElementById('addKeyBtn').onclick = () => { const k = document.getElementById('newApiKeyInput').value.trim(); if(k) { apiKeysList.push(k); localStorage.setItem('neuronsync_api_keys', JSON.stringify(apiKeysList)); updateKeysStatusUI(); } }; document.getElementById('testKeysBtn').onclick = () => alert('✅ وضع تجريبي، جميع المفاتيح وهمية.'); updateKeysStatusUI(); }
    function updateKeysStatusUI() { const c = document.getElementById('keysStatusList'); if(!c) return; if(apiKeysList.length===0) c.innerHTML = `<div>${t('noKeys')}</div>`; else c.innerHTML = apiKeysList.map((k,i)=>`<div class="key-item"><span>🔑 ${k.substr(0,12)}...</span><button onclick="deleteApiKey(${i})" style="background:var(--danger);color:white;border:none;padding:4px 8px;border-radius:12px;">حذف</button></div>`).join(''); }
    window.deleteApiKey = function(idx) { apiKeysList.splice(idx,1); localStorage.setItem('neuronsync_api_keys', JSON.stringify(apiKeysList)); updateKeysStatusUI(); if(apiKeysList.length===0) isDemoMode=true; else isDemoMode=false; document.getElementById('modeBadge').innerHTML = isDemoMode ? t('demoMode') : t('apiMode'); };
    function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('neuronsync_theme', document.body.classList.contains('dark') ? 'dark' : 'light'); applyBackground(); }
    function toggleFullscreenMode() { document.body.classList.toggle('fullscreen-chat-mode'); const h = document.querySelector('.header'), q = document.getElementById('quickButtons'), f = document.querySelector('footer'), s = document.getElementById('sidebar'); if(document.body.classList.contains('fullscreen-chat-mode')) { h.classList.add('hidden'); q.classList.add('hidden'); f.classList.add('hidden'); s.classList.add('hidden'); document.getElementById('fullscreenExitBar').style.display='flex'; } else { h.classList.remove('hidden'); q.classList.remove('hidden'); f.classList.remove('hidden'); s.classList.remove('hidden'); document.getElementById('fullscreenExitBar').style.display='none'; } }
    function setupBgModal() { const modal = document.getElementById('bgModal'); modal.innerHTML = `<div class="bg-picker"><h3>خلفية</h3><div class="bg-options" id="bgOpts"></div><button id="uploadBgBtn" class="btn-success">📁 رفع صورة</button><button id="clearBgBtn" class="btn-warning">🗑️ إزالة</button><button id="closeBgBtn">إغلاق</button><input type="file" id="bgFile" accept="image/*" style="display:none"></div>`; const presets = [{name:'بدون', value:''},{name:'تدرج بنفسجي', value:'gradient1'},{name:'تدرج وردي', value:'gradient2'}]; const container = document.getElementById('bgOpts'); presets.forEach(p=>{ const opt = document.createElement('div'); opt.className='bg-option'; if(currentBgImage===p.value) opt.classList.add('selected'); opt.innerHTML=`<div class="bg-label">${p.name}</div>`; opt.onclick=()=>{ currentBgImage=p.value; localStorage.setItem('neuronsync_bg_image',currentBgImage); applyBackground(); modal.classList.remove('open'); }; container.appendChild(opt); }); document.getElementById('uploadBgBtn').onclick = ()=>document.getElementById('bgFile').click(); document.getElementById('bgFile').onchange = (e)=>{ const file=e.target.files[0]; if(file){ const reader=new FileReader(); reader.onload=ev=>{ currentBgImage=ev.target.result; localStorage.setItem('neuronsync_bg_image',currentBgImage); applyBackground(); modal.classList.remove('open'); }; reader.readAsDataURL(file); } }; document.getElementById('clearBgBtn').onclick = ()=>{ currentBgImage=''; localStorage.setItem('neuronsync_bg_image',''); applyBackground(); modal.classList.remove('open'); }; document.getElementById('closeBgBtn').onclick = ()=>modal.classList.remove('open'); }
    function setupSearchModal() { const modal = document.getElementById('searchModal'); modal.innerHTML = `<div class="search-container"><h3>🔍 بحث</h3><input type="text" id="searchInput" placeholder="كلمة..."><div id="searchResults"></div><button id="closeSearchBtn">إغلاق</button></div>`; document.getElementById('closeSearchBtn').onclick = ()=>modal.classList.remove('open'); document.getElementById('searchInput').addEventListener('input',(e)=>{ const q=e.target.value.trim(); if(!q) return; const res = conversationHistory.filter(m=>m.content.toLowerCase().includes(q.toLowerCase())).map(m=>`<div style="padding:6px;background:var(--border-light);margin:5px 0;border-radius:10px;"><strong>${m.role}</strong>: ${m.content.substring(0,80)}</div>`).join(''); document.getElementById('searchResults').innerHTML = res || 'لا نتائج'; }); }
    
    function initAfterLogin() {
        const savedTheme = localStorage.getItem('neuronsync_theme');
        if(savedTheme === 'dark') document.body.classList.add('dark');
        const savedFont = localStorage.getItem('neuronsync_font');
        if(savedFont) setFontSize(savedFont); else setFontSize('font-medium');
        loadConversationFromLocal();
        applyBackground();
        buildQuickButtons();
        setupSettingsPanel();
        setupBgModal();
        setupSearchModal();
        document.getElementById('sendBtn').onclick = ()=>sendUserMessage();
        document.getElementById('messageInput').onkeypress = (e)=> { if(e.key === 'Enter' && !isWaitingForResponse) sendUserMessage(); };
        document.getElementById('themeToggleBtn').onclick = toggleTheme;
        document.getElementById('clearChatBtn').onclick = clearEntireChat;
        document.getElementById('saveChatBtn').onclick = ()=>{ const blob = new Blob([conversationHistory.map(m=>`${m.role}: ${m.content}`).join('\n\n')], {type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`chat_${Date.now()}.txt`; a.click(); URL.revokeObjectURL(a.href); };
        document.getElementById('menuToggleBtn').onclick = ()=>{ document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); };
        document.getElementById('overlay').onclick = ()=>{ document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); };
        document.getElementById('logoutHeaderBtn').onclick = logout;
        document.getElementById('voiceBtn').onclick = ()=>{ if('webkitSpeechRecognition' in window){ const recog = new webkitSpeechRecognition(); recog.lang = currentLang==='ar'?'ar-EG':'en-US'; recog.onresult=(e)=>{ document.getElementById('messageInput').value = e.results[0][0].transcript; sendUserMessage(); }; recog.start(); } else alert('متصفحك لا يدعم الصوت'); };
        document.getElementById('fullscreenBtn').onclick = toggleFullscreenMode;
        document.getElementById('exitFullscreenBtn').onclick = toggleFullscreenMode;
        document.getElementById('langToggleBtn').onclick = () => { currentLang = currentLang === 'ar' ? 'en' : 'ar'; localStorage.setItem('neuronsync_lang', currentLang); document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr'; buildQuickButtons(); setupSettingsPanel(); document.getElementById('modeBadge').innerHTML = isDemoMode ? t('demoMode') : t('apiMode'); document.getElementById('messageInput').placeholder = t('typeMessage'); renderAllMessages(); };
        document.getElementById('fontIncreaseBtn').onclick = () => changeFontSize(1);
        document.getElementById('fontDecreaseBtn').onclick = () => changeFontSize(-1);
        document.querySelectorAll('.menu-item').forEach(i=>{ i.onclick = ()=>{ switchTab(i.dataset.tab); }; });
        document.getElementById('openSearchBtn').onclick = ()=>{ setupSearchModal(); document.getElementById('searchModal').classList.add('open'); };
        document.getElementById('openBgBtn').onclick = ()=>{ setupBgModal(); document.getElementById('bgModal').classList.add('open'); };
        const infoDiv = document.getElementById('infoPanel');
        infoDiv.innerHTML = `<h2>🧠 NeuroSync Pro</h2><p>👨‍💻 المطور: محمد حلاق 🇱🇧</p><p>✨ يدعم Markdown، صوت، بحث، خلفيات، وضع ليلي.</p>`;
    }
    
    // ربط حدث تسجيل الدخول
    document.getElementById('doLoginBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        performLogin(email, pass);
    });
    
    // التحقق من وجود جلسة سابقة
    const savedUser = localStorage.getItem('neuronsync_user');
    if(savedUser) {
        try {
            const userObj = JSON.parse(savedUser);
            if(userObj.loggedIn && userObj.email) {
                isAuthenticated = true;
                currentUserEmail = userObj.email;
                checkAuthAndRender();
                initAfterLogin();
            } else { checkAuthAndRender(); }
        } catch(e) { checkAuthAndRender(); }
    } else { checkAuthAndRender(); }
</script>
<div id="searchModal" class="search-modal"></div>
<div id="bgModal" class="bg-modal"></div>
</body>
</html>
